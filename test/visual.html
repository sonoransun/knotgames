<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXKNOTS — Visual Diagram Gallery</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 24px;
      color: #333;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #777; font-size: 0.85rem; margin-bottom: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }
    .card-header .num {
      font-weight: 700;
      color: #999;
      font-size: 0.8rem;
    }
    .card-header h3 {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .card-header .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #4a90d9;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card .svg-container {
      display: flex;
      justify-content: center;
      min-height: 200px;
    }
    .card .svg-container svg {
      max-width: 100%;
      height: auto;
    }
    .error { color: #c33; font-size: 0.85rem; padding: 20px; text-align: center; }
    .stats {
      background: #e8f0fe;
      border: 1px solid #4a90d9;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>EXKNOTS — Visual Diagram Gallery</h1>
  <p class="subtitle">All 10 puzzle SVG diagrams rendered side by side for visual verification.</p>
  <div class="stats" id="stats">Loading puzzles...</div>
  <div class="grid" id="gallery"></div>

  <script type="module">
    const puzzles = [
      { id: 1,  path: '../puzzles/puzzle-01.js' },
      { id: 2,  path: '../puzzles/puzzle-02.js' },
      { id: 3,  path: '../puzzles/puzzle-03.js' },
      { id: 4,  path: '../puzzles/puzzle-04.js' },
      { id: 5,  path: '../puzzles/puzzle-05.js' },
      { id: 6,  path: '../puzzles/puzzle-06.js' },
      { id: 7,  path: '../puzzles/puzzle-07.js' },
      { id: 8,  path: '../puzzles/puzzle-08.js' },
      { id: 9,  path: '../puzzles/puzzle-09.js' },
      { id: 10, path: '../puzzles/puzzle-10.js' },
    ];

    const gallery = document.getElementById('gallery');
    const statsEl = document.getElementById('stats');
    let loaded = 0;
    let failed = 0;

    for (const { id, path } of puzzles) {
      const card = document.createElement('div');
      card.className = 'card';

      try {
        const mod = await import(path);
        const meta = mod.metadata;

        card.innerHTML = `
          <div class="card-header">
            <span class="num">${id}.</span>
            <h3>${meta.name}</h3>
            <span class="badge">${meta.difficulty}</span>
          </div>
        `;

        const container = document.createElement('div');
        container.className = 'svg-container';
        card.appendChild(container);

        if (mod.createSVGDiagram) {
          mod.createSVGDiagram(container);
        } else {
          container.innerHTML = '<p class="error">No createSVGDiagram export</p>';
        }

        loaded++;
      } catch (err) {
        card.innerHTML = `
          <div class="card-header">
            <span class="num">${id}.</span>
            <h3>Puzzle ${id}</h3>
          </div>
          <p class="error">Failed to load: ${err.message}</p>
        `;
        failed++;
      }

      gallery.appendChild(card);
    }

    statsEl.textContent = `Loaded: ${loaded}/10 | Failed: ${failed}/10 | ${new Date().toLocaleString()}`;
  </script>
</body>
</html>
