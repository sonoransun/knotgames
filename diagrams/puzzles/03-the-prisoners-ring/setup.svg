<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300">
  <title>The Prisoner's Ring - Setup</title>
  <desc>A rectangular frame with a horizontal crossbar creating two windows. A cord loop threads through both windows with a ring hanging below.</desc>

  <rect width="350" height="300" fill="#fafafa"/>

  <!-- Frame: outer rectangle -->
  <rect x="75" y="40" width="200" height="150" rx="3" ry="3"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- Crossbar at midpoint -->
  <line x1="75" y1="115" x2="275" y2="115"
        stroke="#333" stroke-width="2"/>

  <!-- Cord: dashed loop threading through top window (front to back) -->
  <!-- Segment: comes from ring below, enters bottom window back-to-front -->
  <!-- Right side of cord: up from ring, through bottom window, over crossbar, into top window -->

  <!-- Right cord strand: ring up to bottom window entry -->
  <path d="M 195,265 L 195,195"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <!-- Right cord: through bottom window, going behind frame bottom edge to back -->
  <path d="M 195,195 L 195,130"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Right cord drapes over crossbar: white gap on under-strand (cord goes over crossbar) -->
  <!-- Cord passes over the crossbar on the right side -->
  <path d="M 195,130 L 195,100"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Right cord: through top window going front to back -->
  <path d="M 195,100 C 195,60 175,50 175,50"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Connecting arc behind the frame (shown as curve above) -->
  <path d="M 175,50 C 160,45 155,50 155,50"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Left cord: from top window back to front, down through top window -->
  <path d="M 155,50 C 155,55 155,60 155,100"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Left cord: over crossbar with crossing detail -->
  <!-- Under-strand gap (cord goes over crossbar) -->
  <line x1="155" y1="111" x2="155" y2="119"
        stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>
  <!-- Cord over crossbar -->
  <path d="M 155,100 L 155,130"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Right side: crossing detail at crossbar -->
  <line x1="195" y1="111" x2="195" y2="119"
        stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>
  <path d="M 195,100 L 195,130"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"
        opacity="0"/><!-- already drawn above, crossing gap applied -->

  <!-- Left cord: through bottom window, down to ring -->
  <path d="M 155,130 L 155,195"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <path d="M 155,195 L 155,265"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Cord connecting bottom to ring -->
  <path d="M 155,265 C 155,275 175,282 175,282"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <path d="M 195,265 C 195,275 175,282 175,282"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Ring -->
  <circle cx="175" cy="260" r="18" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Labels -->
  <text x="175" y="85" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">top window</text>
  <text x="175" y="155" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">bottom window</text>

  <!-- Crossbar label with annotation line -->
  <line x1="280" y1="115" x2="310" y2="100"
        stroke="#999" stroke-width="1"/>
  <text x="312" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#666">crossbar</text>

  <!-- Ring label -->
  <text x="175" y="296" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">RING</text>
</svg>