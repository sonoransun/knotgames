<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250">
  <title>The Prisoner's Ring - Key Move</title>
  <desc>The frame with a bight of cord being lifted up and over the left end of the crossbar to free the ring.</desc>

  <rect width="350" height="250" fill="#fafafa"/>

  <!-- Frame: outer rectangle -->
  <rect x="75" y="40" width="200" height="150" rx="3" ry="3"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- Crossbar -->
  <line x1="75" y1="115" x2="275" y2="115"
        stroke="#333" stroke-width="2"/>

  <!-- Crossbar label -->
  <line x1="280" y1="115" x2="310" y2="105"
        stroke="#999" stroke-width="1"/>
  <text x="312" y="109" font-family="system-ui, sans-serif" font-size="10" fill="#666">crossbar</text>

  <!-- Cord: right strand hanging down normally -->
  <path d="M 195,230 L 195,130"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <!-- Right strand crossing over crossbar -->
  <line x1="191" y1="111" x2="199" y2="119"
        stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>
  <path d="M 195,130 L 195,100 L 195,60"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Cord: left strand - the bight being lifted -->
  <path d="M 155,230 L 155,130"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- Bight of cord lifting up and over the left end of crossbar -->
  <!-- The bight curves up from the left cord, arcs over the left end of crossbar -->
  <path d="M 155,130 C 155,100 120,80 90,70 C 60,60 50,80 55,115 C 58,135 65,140 75,140"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>

  <!-- White gap where bight passes over the crossbar end -->
  <line x1="72" y1="111" x2="80" y2="119"
        stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Bight continues after going over -->
  <path d="M 75,140 C 90,140 110,135 130,130"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"
        opacity="0.5"/>

  <!-- Arrow showing upward lift motion -->
  <path d="M 105,130 C 95,100 80,85 70,75"
        stroke="#999" stroke-width="1.5" fill="none"
        marker-end="url(#arrowGray)"/>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 8,3 L 0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Second arrow arc showing the over-the-end motion -->
  <path d="M 68,72 C 55,68 45,85 50,105"
        stroke="#999" stroke-width="1.5" fill="none"
        marker-end="url(#arrowGray)"/>

  <!-- Label for the key move -->
  <text x="22" y="65" font-family="system-ui, sans-serif" font-size="10" fill="#666">bight lifts</text>
  <text x="22" y="77" font-family="system-ui, sans-serif" font-size="10" fill="#666">over end</text>

  <!-- Cord bottom connection -->
  <path d="M 155,230 C 155,238 175,244 175,244"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <path d="M 195,230 C 195,238 175,244 175,244"
        stroke="#333" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
</svg>