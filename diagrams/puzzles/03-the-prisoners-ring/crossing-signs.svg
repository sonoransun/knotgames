<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200">
  <title>The Prisoner's Ring - Crossing Signs</title>
  <desc>Two crossing diagrams showing how the cord crosses the crossbar at each window, with right-hand rule signs summing to zero linking number.</desc>

  <rect width="450" height="200" fill="#fafafa"/>

  <!-- LEFT: Crossing 1 (top window) -->
  <text x="112" y="22" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Crossing 1 (top window)</text>

  <!-- Crossbar (horizontal) - steel gray -->
  <line x1="42" y1="90" x2="182" y2="90"
        stroke="#888" stroke-width="2"/>
  <text x="185" y="94" font-family="system-ui, sans-serif" font-size="10" fill="#666">crossbar</text>

  <!-- Cord diagonal going from bottom-left to top-right (over crossbar) -->
  <!-- Under-strand gap: crossbar is under the cord (10px gap) -->
  <line x1="105" y1="85" x2="119" y2="95"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- Cord over -->
  <line x1="80" y1="130" x2="145" y2="50"
        stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Arrow on cord (direction: upward-right) -->
  <polygon points="140,56 145,50 137,55" fill="#2255aa"/>

  <!-- +1 label -->
  <text x="112" y="155" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">Right-hand rule: +1</text>

  <!-- RIGHT: Crossing 2 (bottom window) -->
  <text x="338" y="22" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Crossing 2 (bottom window)</text>

  <!-- Crossbar (horizontal) - steel gray -->
  <line x1="268" y1="90" x2="408" y2="90"
        stroke="#888" stroke-width="2"/>
  <text x="411" y="94" font-family="system-ui, sans-serif" font-size="10" fill="#666">crossbar</text>

  <!-- Cord diagonal going from top-left to bottom-right (over crossbar, opposite direction) -->
  <!-- Under-strand gap (10px gap) -->
  <line x1="331" y1="85" x2="345" y2="95"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- Cord over -->
  <line x1="305" y1="50" x2="370" y2="130"
        stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Arrow on cord (direction: downward-right) -->
  <polygon points="365,124 370,130 363,125" fill="#2255aa"/>

  <!-- -1 label -->
  <text x="338" y="155" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">Right-hand rule: &#x2212;1</text>

  <!-- Divider -->
  <line x1="225" y1="15" x2="225" y2="160"
        stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom summary -->
  <text x="225" y="185" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333">Linking number = (+1) + (&#x2212;1) = 0</text>
</svg>
