<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Torus Winding Numbers</title>
  <desc>Comparison table showing different (p,q) pairs and their resulting knot types: (1,1)=unknot, (2,2)=link, (2,3)=trefoil, (3,5)=knot. Formula: gcd(p,q)=1 AND p,q at least 2 yields genuine knot.</desc>

  <rect width="400" height="300" fill="#fafafa"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">Torus Knot Winding Numbers (p, q)</text>

  <!-- Table header -->
  <rect x="20" y="35" width="360" height="22" fill="#eee" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">(p, q)</text>
  <text x="150" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Diagram</text>
  <text x="260" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Type</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">gcd</text>

  <!-- Row 1: (1,1) = unknot -->
  <rect x="20" y="57" width="360" height="45" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666">(1, 1)</text>
  <!-- Simple circle for unknot -->
  <circle cx="150" cy="80" r="14" fill="none" stroke="#2255aa" stroke-width="2"/>
  <text x="260" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">unknot</text>
  <text x="340" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">1</text>

  <!-- Row 2: (2,2) = link (2 components) -->
  <rect x="20" y="102" width="360" height="45" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="128" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666">(2, 2)</text>
  <!-- Two linked circles -->
  <circle cx="143" cy="125" r="12" fill="none" stroke="#dd3333" stroke-width="1.5"/>
  <circle cx="157" cy="125" r="12" fill="none" stroke="#3333dd" stroke-width="1.5"/>
  <text x="260" y="128" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">2-comp link</text>
  <text x="340" y="128" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">2</text>

  <!-- Row 3: (2,3) = trefoil -->
  <rect x="20" y="147" width="360" height="45" fill="#eeffee" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="173" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666" font-weight="bold">(2, 3)</text>
  <!-- Trefoil schematic -->
  <path d="M 150,158 C 140,158 132,165 138,172 C 144,179 156,179 162,172 C 168,165 160,158 150,158"
        fill="none" stroke="#2255aa" stroke-width="2"/>
  <!-- Crossing marks -->
  <line x1="143" y1="164" x2="148" y2="170" stroke="#2255aa" stroke-width="2"/>
  <line x1="152" y1="170" x2="157" y2="164" stroke="#2255aa" stroke-width="2"/>
  <line x1="147" y1="176" x2="153" y2="176" stroke="#2255aa" stroke-width="2"/>
  <text x="260" y="173" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#33aa33" font-weight="bold">trefoil knot</text>
  <text x="340" y="173" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">1</text>

  <!-- Row 4: (3,5) = torus knot -->
  <rect x="20" y="192" width="360" height="45" fill="#eeffee" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="218" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666" font-weight="bold">(3, 5)</text>
  <!-- Complex knot schematic -->
  <path d="M 140,205 Q 135,210 140,218 Q 145,225 150,218 Q 155,210 160,218 Q 165,225 160,230"
        fill="none" stroke="#2255aa" stroke-width="2"/>
  <path d="M 140,205 Q 150,200 160,205" fill="none" stroke="#2255aa" stroke-width="2"/>
  <path d="M 140,230 Q 150,235 160,230" fill="none" stroke="#2255aa" stroke-width="2"/>
  <line x1="140" y1="218" x2="140" y2="230" stroke="#2255aa" stroke-width="2"/>
  <text x="260" y="218" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#33aa33" font-weight="bold">(3,5) torus knot</text>
  <text x="340" y="218" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">1</text>

  <!-- Formula box -->
  <rect x="30" y="248" width="340" height="30" rx="4" fill="#f0f0ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="200" y="267" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666">gcd(p, q) = 1  AND  p, q &#x2265; 2  &#x2192;  genuine knot</text>

  <!-- Legend -->
  <line x1="30" y1="292" x2="55" y2="292" stroke="#2255aa" stroke-width="2"/>
  <text x="63" y="296" font-family="system-ui, sans-serif" font-size="9" fill="#666">knot diagram</text>

  <rect x="180" y="286" width="40" height="12" fill="#eeffee" stroke="#ccc" stroke-width="0.5"/>
  <text x="228" y="296" font-family="system-ui, sans-serif" font-size="9" fill="#666">genuine knot row</text>
</svg>