<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <title>The Torus Winder - Setup</title>
  <desc>Top-down view of torus (two concentric ellipses) with guide notch markers. Cord not yet wound. Small ring and ball-stops visible nearby.</desc>

  <rect width="300" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="150" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">The Torus Winder — Setup</text>
  <text x="150" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">top-down view, cord unwound</text>

  <!-- Torus: outer ellipse -->
  <ellipse cx="150" cy="160" rx="110" ry="70" fill="none" stroke="#888" stroke-width="2"/>

  <!-- Torus: inner ellipse (hole) -->
  <ellipse cx="150" cy="160" rx="40" ry="25" fill="none" stroke="#888" stroke-width="2"/>

  <!-- Guide notch markers around outer edge (yellow circles) -->
  <circle cx="260" cy="160" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="230" cy="105" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="150" cy="90" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="70" cy="105" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="40" cy="160" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="70" cy="215" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="150" cy="230" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <circle cx="230" cy="215" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>

  <!-- Guide notch labels -->
  <text x="268" y="164" font-family="system-ui, sans-serif" font-size="7" fill="#ddcc33">n1</text>
  <text x="238" y="102" font-family="system-ui, sans-serif" font-size="7" fill="#ddcc33">n2</text>
  <text x="155" y="87" font-family="system-ui, sans-serif" font-size="7" fill="#ddcc33">n3</text>
  <text x="50" y="102" font-family="system-ui, sans-serif" font-size="7" fill="#ddcc33">n4</text>
  <text x="20" y="164" font-family="system-ui, sans-serif" font-size="7" fill="#ddcc33">n5</text>
  <text x="50" y="222" font-family="system-ui, sans-serif" font-size="7" fill="#ddcc33">n6</text>

  <!-- Cord (not yet wound, lying flat beside the torus) -->
  <path d="M 140,260 Q 160,255 180,260 Q 200,265 220,260 Q 240,255 260,262"
        fill="none" stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#2255aa">cord (unwound)</text>

  <!-- Small ring -->
  <circle cx="80" cy="270" r="8" fill="none" stroke="#cc8800" stroke-width="2"/>
  <text x="80" y="288" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#cc8800">ring</text>

  <!-- Ball-stops -->
  <circle cx="130" cy="275" r="4" fill="#888" stroke="#888" stroke-width="1"/>
  <circle cx="145" cy="275" r="4" fill="#888" stroke="#888" stroke-width="1"/>
  <text x="137" y="292" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#666">ball-stops</text>

  <!-- Dimension annotation: outer radius -->
  <line x1="150" y1="160" x2="260" y2="160" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="205" y="155" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#999">R = outer</text>

  <!-- Dimension annotation: inner radius -->
  <line x1="150" y1="160" x2="190" y2="160" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="170" y="172" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#999">r = inner</text>

  <!-- Legend -->
  <line x1="20" y1="310" x2="50" y2="310" stroke="#888" stroke-width="2"/>
  <text x="58" y="314" font-family="system-ui, sans-serif" font-size="9" fill="#666">torus surface</text>

  <line x1="20" y1="325" x2="50" y2="325" stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="58" y="329" font-family="system-ui, sans-serif" font-size="9" fill="#666">flexible cord</text>

  <circle cx="35" cy="340" r="4" fill="none" stroke="#ddcc33" stroke-width="1.5"/>
  <text x="58" y="344" font-family="system-ui, sans-serif" font-size="9" fill="#666">guide notch</text>
</svg>