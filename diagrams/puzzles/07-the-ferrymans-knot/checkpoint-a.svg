<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350">
  <title>Puzzle 7: Checkpoint A — 2 Wraps Remain</title>
  <desc>After removing the first wrap: the post still has 2 wraps of cord around it with visible crossings.</desc>

  <rect width="250" height="350" fill="#fafafa"/>

  <!-- Step badge (upper-right) -->
  <circle cx="225" cy="25" r="16" fill="#2255aa" opacity="0.12" stroke="#2255aa" stroke-width="1.5"/>
  <text x="225" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2255aa" font-weight="bold">Step</text>
  <text x="225" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#2255aa" font-weight="bold">1 of 3</text>

  <!-- Base block (dark wood) -->
  <rect x="65" y="280" width="120" height="40" rx="3" fill="#8b6914" stroke="#6b4f10" stroke-width="2"/>

  <!-- Post (wood) -->
  <rect x="115" y="70" width="20" height="210" fill="#c4956a" stroke="#a07050" stroke-width="2"/>

  <!-- Ball finial (wood) -->
  <circle cx="125" cy="55" r="15" fill="#c4956a" stroke="#a07050" stroke-width="2"/>

  <!-- Ring on post (brass, below wraps) -->
  <circle cx="125" cy="240" r="8" fill="none" stroke="#cc8800" stroke-width="2.5"/>

  <!-- Hook at base (steel) -->
  <path d="M125,280 L125,290 Q125,305 115,305 Q105,305 105,295" fill="none" stroke="#888" stroke-width="2.5"/>

  <!-- Ghost outline of removed wrap (light gray) -->
  <path d="M140,130 Q155,115 140,100" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M110,125 Q95,110 110,95" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="172" y="115" font-family="system-ui, sans-serif" font-size="8" fill="#ccc" font-style="italic">removed</text>

  <!-- Cord from ring upward -->
  <line x1="133" y1="240" x2="140" y2="215" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- Wrap 1 (bottom crossing, 2 remain) -->
  <!-- Under-strand gap -->
  <path d="M110,195 Q95,180 110,165" fill="none" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- Over-strand (front, full opacity) -->
  <path d="M140,215 Q155,195 140,175" fill="none" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Under-strand (behind crossing) -->
  <path d="M110,195 Q95,180 110,165" fill="none" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.7"/>
  <!-- Connecting arc behind post -->
  <path d="M140,175 Q145,170 140,165" fill="none" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Wrap 2 (top crossing) -->
  <!-- Under-strand gap -->
  <path d="M140,155 Q155,140 140,125" fill="none" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- Over-strand (front, full opacity) -->
  <path d="M110,165 Q95,145 110,125" fill="none" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Under-strand (behind crossing) -->
  <path d="M140,155 Q155,140 140,125" fill="none" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Cord from top wrap upward -->
  <path d="M110,125 Q108,115 110,105" fill="none" stroke="#2255aa" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- === Label === -->
  <text x="125" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666" font-weight="bold">2 wraps remain</text>

  <!-- Annotation -->
  <line x1="160" y1="170" x2="185" y2="170" stroke="#999" stroke-width="1"/>
  <text x="188" y="174" font-family="system-ui, sans-serif" font-size="10" fill="#999">2 crossings</text>
</svg>