<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350">
  <title>Puzzle 7: The Ferryman's Knot — Solved</title>
  <desc>The solved state: cord hangs freely alongside the post with no wraps. The ring remains on the post, trapped by the finial.</desc>

  <rect width="250" height="350" fill="#fafafa"/>

  <!-- Base block -->
  <rect x="65" y="280" width="120" height="40" rx="3" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Post -->
  <rect x="115" y="70" width="20" height="210" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Ball finial -->
  <circle cx="125" cy="55" r="15" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Ring on post (trapped by finial) -->
  <circle cx="125" cy="110" r="8" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Hook at base -->
  <path d="M125,280 L125,290 Q125,305 115,305 Q105,305 105,295" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Cord hanging freely (dashed vertical line alongside post) -->
  <line x1="150" y1="110" x2="150" y2="275" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Cord connects to ring -->
  <line x1="133" y1="110" x2="150" y2="110" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Cord connects to hook area -->
  <path d="M150,275 Q150,285 140,290 Q130,295 125,290" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- === Labels === -->

  <!-- "cord hangs freely" label -->
  <line x1="153" y1="190" x2="180" y2="190" stroke="#999" stroke-width="1"/>
  <text x="183" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#666">cord hangs freely</text>

  <!-- "no wraps" label -->
  <line x1="153" y1="155" x2="180" y2="155" stroke="#999" stroke-width="1"/>
  <text x="183" y="159" font-family="system-ui, sans-serif" font-size="10" fill="#666">no wraps</text>

  <!-- Title label -->
  <text x="125" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666" font-weight="bold">SOLVED</text>
</svg>