<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <title>Reidemeister Type I Move (Twist Removal)</title>
  <desc>Before: a vertical strand with a small loop creating one crossing. After: a straight vertical strand with no crossing.</desc>

  <rect width="400" height="200" fill="#fafafa"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666" font-weight="bold">Type I move (twist removal)</text>

  <!-- === LEFT: Before (strand with loop/twist) === -->

  <!-- Strand coming from top -->
  <line x1="100" y1="45" x2="100" y2="80" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Loop/twist creating one crossing -->
  <!-- Under-strand gap -->
  <path d="M100,105 Q70,95 80,115" fill="none" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Over-strand (goes from top-strand, loops right, crosses over, continues down) -->
  <path d="M100,80 Q130,90 120,110 Q110,130 100,120" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Under-strand (continues through the crossing) -->
  <path d="M100,105 Q70,95 80,115 Q90,135 100,120" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Strand continuing downward -->
  <line x1="100" y1="120" x2="100" y2="160" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Crossing indicator -->
  <circle cx="95" cy="108" r="4" fill="none" stroke="#999" stroke-width="1"/>

  <!-- Label "One crossing" -->
  <text x="100" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">One crossing</text>

  <!-- === Arrow in the middle === -->
  <line x1="170" y1="105" x2="225" y2="105" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#999"/>
    </marker>
  </defs>

  <!-- === RIGHT: After (straight strand) === -->

  <!-- Simple straight vertical strand -->
  <line x1="300" y1="45" x2="300" y2="160" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Label "Zero crossings" -->
  <text x="300" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Zero crossings</text>

  <!-- Before/After labels -->
  <text x="100" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">Before</text>
  <text x="300" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">After</text>
</svg>