<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <title>Braid Sequence</title>
  <desc>Three-panel diagram showing the sigma_1, sigma_2, sigma_1 braid sequence on three strands, with crossings labeled and arrows showing swap direction.</desc>

  <defs>
    <marker id="swapArrow" markerWidth="6" markerHeight="4" refX="3" refY="2"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="400" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">Braid Sequence: &#x03C3;&#x2081; &#x03C3;&#x2082; &#x03C3;&#x2081;</text>

  <!-- Panel separators -->
  <line x1="140" y1="40" x2="140" y2="280" stroke="#ddd" stroke-width="1"/>
  <line x1="270" y1="40" x2="270" y2="280" stroke="#ddd" stroke-width="1"/>

  <!-- === Panel 1: sigma_1 === -->
  <text x="70" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666" font-weight="bold">&#x03C3;&#x2081;</text>
  <text x="70" y="70" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#999">swap strands 1,2</text>

  <!-- Three strands entering at top -->
  <!-- Strand 1 (blue) crosses over strand 2 (yellow) -->
  <line x1="40" y1="85" x2="40" y2="130" stroke="#3333dd" stroke-width="2.5"/>
  <line x1="40" y1="130" x2="100" y2="200" stroke="#3333dd" stroke-width="2.5"/>
  <!-- Gap in strand 2 at crossing -->
  <line x1="70" y1="85" x2="70" y2="130" stroke="#ddcc33" stroke-width="2.5"/>
  <line x1="70" y1="130" x2="58" y2="148" stroke="#ddcc33" stroke-width="2.5"/>
  <!-- crossing gap -->
  <line x1="48" y1="160" x2="40" y2="200" stroke="#ddcc33" stroke-width="2.5"/>
  <!-- Strand 3 (red) goes straight -->
  <line x1="100" y1="85" x2="100" y2="200" stroke="#dd3333" stroke-width="2.5"/>

  <!-- Continue to bottom -->
  <line x1="100" y1="200" x2="100" y2="260" stroke="#3333dd" stroke-width="2.5"/>
  <line x1="40" y1="200" x2="40" y2="260" stroke="#ddcc33" stroke-width="2.5"/>
  <line x1="100" y1="200" x2="100" y2="260" stroke="#dd3333" stroke-width="2.5"/>

  <!-- Swap arrow -->
  <path d="M 42,110 Q 55,100 68,110" fill="none" stroke="#666" stroke-width="1" marker-end="url(#swapArrow)"/>

  <!-- === Panel 2: sigma_2 === -->
  <text x="205" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666" font-weight="bold">&#x03C3;&#x2082;</text>
  <text x="205" y="70" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#999">swap strands 2,3</text>

  <!-- Strand 1 goes straight -->
  <line x1="175" y1="85" x2="175" y2="260" stroke="#ddcc33" stroke-width="2.5"/>
  <!-- Strand 2 (blue now at pos 2) crosses over strand 3 (red) -->
  <line x1="205" y1="85" x2="205" y2="130" stroke="#3333dd" stroke-width="2.5"/>
  <line x1="205" y1="130" x2="235" y2="200" stroke="#3333dd" stroke-width="2.5"/>
  <!-- Gap in strand 3 -->
  <line x1="235" y1="85" x2="235" y2="130" stroke="#dd3333" stroke-width="2.5"/>
  <line x1="235" y1="130" x2="223" y2="148" stroke="#dd3333" stroke-width="2.5"/>
  <line x1="213" y1="160" x2="205" y2="200" stroke="#dd3333" stroke-width="2.5"/>

  <line x1="235" y1="200" x2="235" y2="260" stroke="#3333dd" stroke-width="2.5"/>
  <line x1="205" y1="200" x2="205" y2="260" stroke="#dd3333" stroke-width="2.5"/>

  <!-- Swap arrow -->
  <path d="M 207,110 Q 220,100 233,110" fill="none" stroke="#666" stroke-width="1" marker-end="url(#swapArrow)"/>

  <!-- === Panel 3: sigma_1 again === -->
  <text x="335" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666" font-weight="bold">&#x03C3;&#x2081;</text>
  <text x="335" y="70" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#999">swap strands 1,2</text>

  <!-- Strand 1 (yellow at pos 1) crosses over strand 2 (red now at pos 2) -->
  <line x1="305" y1="85" x2="305" y2="130" stroke="#ddcc33" stroke-width="2.5"/>
  <line x1="305" y1="130" x2="335" y2="200" stroke="#ddcc33" stroke-width="2.5"/>
  <!-- Gap in strand 2 -->
  <line x1="335" y1="85" x2="335" y2="130" stroke="#dd3333" stroke-width="2.5"/>
  <line x1="335" y1="130" x2="323" y2="148" stroke="#dd3333" stroke-width="2.5"/>
  <line x1="313" y1="160" x2="305" y2="200" stroke="#dd3333" stroke-width="2.5"/>
  <!-- Strand 3 (blue at pos 3) goes straight -->
  <line x1="365" y1="85" x2="365" y2="260" stroke="#3333dd" stroke-width="2.5"/>

  <line x1="335" y1="200" x2="335" y2="260" stroke="#ddcc33" stroke-width="2.5"/>
  <line x1="305" y1="200" x2="305" y2="260" stroke="#dd3333" stroke-width="2.5"/>

  <!-- Swap arrow -->
  <path d="M 307,110 Q 320,100 333,110" fill="none" stroke="#666" stroke-width="1" marker-end="url(#swapArrow)"/>

  <!-- Legend -->
  <line x1="20" y1="300" x2="50" y2="300" stroke="#3333dd" stroke-width="2.5"/>
  <text x="58" y="304" font-family="system-ui, sans-serif" font-size="9" fill="#666">strand 1 (blue)</text>

  <line x1="150" y1="300" x2="180" y2="300" stroke="#ddcc33" stroke-width="2.5"/>
  <text x="188" y="304" font-family="system-ui, sans-serif" font-size="9" fill="#666">strand 2 (yellow)</text>

  <line x1="290" y1="300" x2="320" y2="300" stroke="#dd3333" stroke-width="2.5"/>
  <text x="328" y="304" font-family="system-ui, sans-serif" font-size="9" fill="#666">strand 3 (red)</text>

  <text x="200" y="340" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#999">over-strand shown continuous; under-strand has gap at crossing</text>
</svg>