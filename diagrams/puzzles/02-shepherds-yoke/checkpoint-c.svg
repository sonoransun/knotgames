<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250">
  <title>Shepherd's Yoke - Checkpoint C</title>
  <desc>The paddle with an empty hole. The cord loop is now around the paddle body, not through the hole.</desc>

  <rect width="350" height="250" fill="#fafafa"/>

  <!-- Paddle body -->
  <rect x="75" y="50" width="200" height="100" rx="4" ry="4"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- Hole in center - empty -->
  <circle cx="175" cy="100" r="12" fill="#fafafa" stroke="#333" stroke-width="2"/>

  <!-- Cord loop: now around the entire paddle body, not through the hole -->
  <path d="M 65,50 Q 40,50 35,65 L 35,135 Q 35,160 55,165
           L 285,165 Q 310,165 315,145 L 315,60 Q 315,40 295,40
           L 55,40 Q 40,40 35,50"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"
        stroke-linejoin="round"/>

  <!-- "Hole is now empty" annotation -->
  <defs>
    <marker id="arrowNote" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0,0 L 8,3 L 0,6 Z" fill="#999"/>
    </marker>
  </defs>
  <line x1="175" y1="78" x2="175" y2="90" stroke="#999" stroke-width="1"
        marker-end="url(#arrowNote)"/>
  <text x="175" y="72" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">hole is now empty</text>

  <!-- "Loop is around the paddle body" annotation -->
  <path d="M 30,190 L 30,160" fill="none" stroke="#999" stroke-width="1"
        marker-end="url(#arrowNote)"/>
  <text x="30" y="200" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">loop is around</text>
  <text x="30" y="212" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">the paddle body</text>

  <!-- Cord drape below showing it's a complete loop -->
  <path d="M 35,150 Q 35,210 175,220 Q 315,210 315,150"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
</svg>
