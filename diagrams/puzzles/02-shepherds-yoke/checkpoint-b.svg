<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250">
  <title>Shepherd's Yoke - Checkpoint B</title>
  <desc>The paddle with the bight being stretched over the short (80mm) edge. The cord loop is being pulled over one short edge.</desc>

  <rect width="350" height="250" fill="#fafafa"/>

  <!-- Paddle body -->
  <rect x="75" y="50" width="200" height="100" rx="4" ry="4"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- Hole in center -->
  <circle cx="175" cy="100" r="12" fill="#fafafa" stroke="#333" stroke-width="2"/>

  <!-- Short edge dimension -->
  <line x1="62" y1="50" x2="62" y2="150" stroke="#999" stroke-width="1"/>
  <line x1="58" y1="50" x2="66" y2="50" stroke="#999" stroke-width="1"/>
  <line x1="58" y1="150" x2="66" y2="150" stroke="#999" stroke-width="1"/>
  <text x="55" y="105" text-anchor="end" font-family="system-ui, sans-serif"
        font-size="10" fill="#999" transform="rotate(-90,55,105)">80mm</text>

  <!-- Cord strands entering hole from right side -->
  <path d="M 170,88 L 170,50 Q 170,35 160,35 Q 145,35 145,50 L 145,100"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 180,88 L 180,50 Q 180,35 195,35 Q 210,35 210,50 L 210,100"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Bight stretching over the left short edge -->
  <path d="M 145,100 Q 120,120 75,100 Q 50,90 45,100
           Q 35,120 55,140 Q 75,155 75,150"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 210,100 Q 235,120 275,150 Q 285,160 280,170
           Q 270,190 240,185 Q 210,175 210,150"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Cord continues below -->
  <path d="M 75,150 Q 100,200 175,210 Q 250,200 280,170"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Arrow showing direction of stretch -->
  <defs>
    <marker id="arrowAnnot" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0,0 L 8,3 L 0,6 Z" fill="#999"/>
    </marker>
  </defs>
  <path d="M 60,80 Q 40,90 35,110"
        fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrowAnnot)"/>

  <!-- Label -->
  <text x="175" y="235" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">bight stretching over 80mm edge</text>
</svg>
