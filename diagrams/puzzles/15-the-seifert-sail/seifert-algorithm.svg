<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <title>Seifert Algorithm</title>
  <desc>Three-step Seifert algorithm: Step 1: Original trefoil diagram. Step 2: Smoothed crossings yielding two Seifert circles. Step 3: Fill circles with disks, connect with half-twist bands.</desc>

  <defs>
    <marker id="stepArrow" markerWidth="8" markerHeight="6" refX="4" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 8,3 L 0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect width="400" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">Seifert Algorithm (3 Steps)</text>

  <!-- Step labels background -->
  <rect x="15" y="32" width="110" height="18" rx="3" fill="#eee" stroke="none"/>
  <rect x="145" y="32" width="110" height="18" rx="3" fill="#eee" stroke="none"/>
  <rect x="275" y="32" width="110" height="18" rx="3" fill="#eee" stroke="none"/>

  <text x="70" y="46" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Step 1: Diagram</text>
  <text x="200" y="46" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Step 2: Smooth</text>
  <text x="330" y="46" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Step 3: Fill</text>

  <!-- Arrows between steps -->
  <line x1="127" y1="120" x2="143" y2="120" stroke="#999" stroke-width="1.5" marker-end="url(#stepArrow)"/>
  <line x1="257" y1="120" x2="273" y2="120" stroke="#999" stroke-width="1.5" marker-end="url(#stepArrow)"/>

  <!-- === Step 1: Trefoil diagram === -->
  <g transform="translate(70,130)">
    <!-- Arc 1: top -->
    <path d="M -25,-40 Q -35,-55 -15,-60 Q 0,-65 15,-60 Q 35,-55 25,-40"
          fill="none" stroke="#888" stroke-width="2.5"/>
    <!-- Arc 2: bottom-right -->
    <path d="M 25,-40 Q 40,-25 35,-5 Q 30,10 15,18 Q 5,22 0,15"
          fill="none" stroke="#888" stroke-width="2.5"/>
    <!-- Arc 3: bottom-left -->
    <path d="M 0,15 Q -5,22 -15,18 Q -30,10 -35,-5 Q -40,-25 -25,-40"
          fill="none" stroke="#888" stroke-width="2.5"/>

    <!-- Crossing marks -->
    <circle cx="0" cy="-35" r="5" fill="#fafafa" stroke="#999" stroke-width="0.5"/>
    <circle cx="-20" cy="0" r="5" fill="#fafafa" stroke="#999" stroke-width="0.5"/>
    <circle cx="20" cy="0" r="5" fill="#fafafa" stroke="#999" stroke-width="0.5"/>

    <text x="0" y="-35" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif"
          font-size="6" fill="#999">c</text>
    <text x="-20" y="0" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif"
          font-size="6" fill="#999">c</text>
    <text x="20" y="0" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif"
          font-size="6" fill="#999">c</text>
  </g>

  <!-- === Step 2: Smoothed crossings → two Seifert circles === -->
  <g transform="translate(200,130)">
    <!-- Outer Seifert circle -->
    <ellipse cx="0" cy="-15" rx="35" ry="40" fill="none" stroke="#3333dd" stroke-width="2"/>
    <text x="40" y="-15" font-family="system-ui, sans-serif" font-size="7" fill="#3333dd">S1</text>

    <!-- Inner Seifert circle -->
    <ellipse cx="0" cy="-5" rx="14" ry="16" fill="none" stroke="#dd3333" stroke-width="2"/>
    <text x="18" y="-5" font-family="system-ui, sans-serif" font-size="7" fill="#dd3333">S2</text>

    <!-- Small arrows showing smoothing direction -->
    <text x="0" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="8" fill="#999">crossings smoothed</text>
    <text x="0" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="8" fill="#999">→ 2 Seifert circles</text>
  </g>

  <!-- === Step 3: Fill disks, add twist bands === -->
  <g transform="translate(330,130)">
    <!-- Outer disk (filled) -->
    <ellipse cx="0" cy="-15" rx="35" ry="40" fill="#3333dd" fill-opacity="0.12"
             stroke="#3333dd" stroke-width="2"/>

    <!-- Inner disk (filled, different shade) -->
    <ellipse cx="0" cy="-5" rx="14" ry="16" fill="#dd3333" fill-opacity="0.12"
             stroke="#dd3333" stroke-width="2"/>

    <!-- Twist bands connecting the two disks (at the 3 former crossing locations) -->
    <!-- Band 1: top -->
    <path d="M -5,-55 Q -3,-42 -3,-30" fill="none" stroke="#cc8800" stroke-width="2"/>
    <path d="M 5,-55 Q 3,-42 3,-30" fill="none" stroke="#cc8800" stroke-width="2"/>
    <!-- twist indicator -->
    <path d="M -4,-42 L 4,-42" fill="none" stroke="#cc8800" stroke-width="1" stroke-dasharray="1,1"/>

    <!-- Band 2: bottom-left -->
    <path d="M -22,5 Q -16,0 -12,-8" fill="none" stroke="#cc8800" stroke-width="2"/>
    <path d="M -28,12 Q -20,5 -16,-3" fill="none" stroke="#cc8800" stroke-width="2"/>
    <path d="M -20,3 L -16,-1" fill="none" stroke="#cc8800" stroke-width="1" stroke-dasharray="1,1"/>

    <!-- Band 3: bottom-right -->
    <path d="M 22,5 Q 16,0 12,-8" fill="none" stroke="#cc8800" stroke-width="2"/>
    <path d="M 28,12 Q 20,5 16,-3" fill="none" stroke="#cc8800" stroke-width="2"/>
    <path d="M 20,3 L 16,-1" fill="none" stroke="#cc8800" stroke-width="1" stroke-dasharray="1,1"/>

    <text x="0" y="40" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="8" fill="#999">disks + twist bands</text>
    <text x="0" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="8" fill="#999">= Seifert surface</text>
  </g>

  <!-- Formula section -->
  <rect x="30" y="225" width="340" height="45" rx="4" fill="#f0f0ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="200" y="242" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">Genus = (crossings - Seifert circles + 1) / 2</text>
  <text x="200" y="258" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">g = (3 - 2 + 1) / 2 = 1</text>

  <!-- Legend -->
  <line x1="20" y1="290" x2="50" y2="290" stroke="#888" stroke-width="2.5"/>
  <text x="58" y="294" font-family="system-ui, sans-serif" font-size="9" fill="#666">knot diagram</text>

  <line x1="20" y1="305" x2="50" y2="305" stroke="#3333dd" stroke-width="2"/>
  <text x="58" y="309" font-family="system-ui, sans-serif" font-size="9" fill="#666">Seifert circle / disk</text>

  <line x1="180" y1="305" x2="210" y2="305" stroke="#cc8800" stroke-width="2"/>
  <text x="218" y="309" font-family="system-ui, sans-serif" font-size="9" fill="#666">half-twist band</text>

  <line x1="20" y1="320" x2="50" y2="320" stroke="#dd3333" stroke-width="2"/>
  <text x="58" y="324" font-family="system-ui, sans-serif" font-size="9" fill="#666">inner Seifert circle</text>

  <text x="200" y="345" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#999">Trefoil has genus 1 Seifert surface with 2 disks and 3 bands</text>
</svg>