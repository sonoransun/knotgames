<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <title>The Mirror Gate - Setup</title>
  <desc>Two trefoil wire frames (one red, one blue) sitting on a wooden base. Left recess marked red, right marked blue. Both trefoils currently on wrong sides. Center post with cord visible.</desc>

  <defs>
    <marker id="cordArrow" markerWidth="6" markerHeight="4" refX="3" refY="2"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#2255aa"/>
    </marker>
  </defs>

  <rect width="300" height="350" fill="#fafafa"/>

  <!-- Wooden base -->
  <rect x="20" y="240" width="260" height="30" rx="3" fill="none" stroke="#888" stroke-width="2"/>
  <line x1="20" y1="255" x2="280" y2="255" stroke="#888" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Left recess (red outline — expects left-handed trefoil) -->
  <rect x="40" y="244" width="60" height="22" rx="2" fill="none" stroke="#dd3333" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="70" y="280" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#dd3333">L recess</text>

  <!-- Right recess (blue outline — expects right-handed trefoil) -->
  <rect x="200" y="244" width="60" height="22" rx="2" fill="none" stroke="#3333dd" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="230" y="280" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#3333dd">R recess</text>

  <!-- Center post -->
  <rect x="145" y="200" width="10" height="40" fill="none" stroke="#888" stroke-width="2"/>
  <circle cx="150" cy="197" r="5" fill="none" stroke="#888" stroke-width="1.5"/>

  <!-- Cord through center post -->
  <path d="M 100,210 Q 125,195 145,215"
        fill="none" stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 155,215 Q 175,195 200,210"
        fill="none" stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Blue trefoil (right-handed) on LEFT side (wrong position) -->
  <g transform="translate(70,150)">
    <!-- Trefoil knot shape — three lobes -->
    <path d="M 0,-35 C 20,-35 30,-15 20,0 C 10,15 -10,15 -20,0 C -30,-15 -20,-35 0,-35"
          fill="none" stroke="#3333dd" stroke-width="2.5"/>
    <!-- Crossing indicators -->
    <line x1="-8" y1="-10" x2="8" y2="-20" stroke="#3333dd" stroke-width="2.5"/>
    <line x1="-12" y1="5" x2="0" y2="-8" stroke="#3333dd" stroke-width="2.5"/>
    <line x1="12" y1="5" x2="0" y2="-8" stroke="#3333dd" stroke-width="2.5"/>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="9" fill="#3333dd">R-trefoil</text>
  </g>

  <!-- Red trefoil (left-handed) on RIGHT side (wrong position) -->
  <g transform="translate(230,150)">
    <!-- Trefoil knot shape — three lobes (mirrored) -->
    <path d="M 0,-35 C -20,-35 -30,-15 -20,0 C -10,15 10,15 20,0 C 30,-15 20,-35 0,-35"
          fill="none" stroke="#dd3333" stroke-width="2.5"/>
    <!-- Crossing indicators (mirrored) -->
    <line x1="8" y1="-10" x2="-8" y2="-20" stroke="#dd3333" stroke-width="2.5"/>
    <line x1="12" y1="5" x2="0" y2="-8" stroke="#dd3333" stroke-width="2.5"/>
    <line x1="-12" y1="5" x2="0" y2="-8" stroke="#dd3333" stroke-width="2.5"/>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif"
          font-size="9" fill="#dd3333">L-trefoil</text>
  </g>

  <!-- Arrows showing wrong placement -->
  <path d="M 90,115 L 60,244" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>
  <path d="M 210,115 L 240,244" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Title label -->
  <text x="150" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">The Mirror Gate — Setup</text>
  <text x="150" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">Trefoils on wrong sides</text>

  <!-- Legend -->
  <line x1="20" y1="305" x2="50" y2="305" stroke="#dd3333" stroke-width="2.5"/>
  <text x="58" y="309" font-family="system-ui, sans-serif" font-size="9" fill="#666">left-handed trefoil</text>

  <line x1="20" y1="320" x2="50" y2="320" stroke="#3333dd" stroke-width="2.5"/>
  <text x="58" y="324" font-family="system-ui, sans-serif" font-size="9" fill="#666">right-handed trefoil</text>

  <line x1="20" y1="335" x2="50" y2="335" stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="58" y="339" font-family="system-ui, sans-serif" font-size="9" fill="#666">flexible cord</text>
</svg>