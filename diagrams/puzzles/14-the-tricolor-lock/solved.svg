<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <title>The Tricolor Lock - Solved</title>
  <desc>Trefoil with colored arcs (red, blue, yellow). Ring has been freed and sits to the side. Arrow showing exit path through crossing.</desc>

  <defs>
    <marker id="exitArrow" markerWidth="6" markerHeight="4" refX="3" refY="2"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#33aa33"/>
    </marker>
  </defs>

  <rect width="300" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="150" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">The Tricolor Lock — Solved</text>
  <text x="150" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#33aa33">ring freed via coloring insight</text>

  <!-- Trefoil with colored arcs -->
  <!-- Arc 1 (red): top -->
  <path d="M 100,120 Q 85,95 110,85 Q 140,72 150,80 Q 160,72 190,85 Q 215,95 200,120"
        fill="none" stroke="#dd3333" stroke-width="3" stroke-linecap="round"/>

  <!-- Arc 2 (blue): right going down -->
  <path d="M 200,120 Q 225,155 210,185 Q 195,210 170,218 Q 155,222 148,212"
        fill="none" stroke="#3333dd" stroke-width="3" stroke-linecap="round"/>

  <!-- Arc 3 (yellow): left going up -->
  <path d="M 148,212 Q 140,222 125,218 Q 100,210 90,185 Q 78,155 100,120"
        fill="none" stroke="#ddcc33" stroke-width="3" stroke-linecap="round"/>

  <!-- Crossing gaps (under-strand breaks) -->
  <!-- Top crossing -->
  <line x1="143" y1="104" x2="157" y2="104" stroke="#fafafa" stroke-width="8"/>
  <line x1="140" y1="130" x2="150" y2="100" stroke="#888" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="150" y1="100" x2="160" y2="130" stroke="#888" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Right crossing -->
  <line x1="198" y1="162" x2="204" y2="172" stroke="#fafafa" stroke-width="8"/>

  <!-- Left crossing -->
  <line x1="96" y1="162" x2="90" y2="172" stroke="#fafafa" stroke-width="8"/>

  <!-- Crossing checkmarks -->
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#33aa33">&#x2713;</text>
  <text x="210" y="170" text-anchor="start" font-family="system-ui, sans-serif"
        font-size="9" fill="#33aa33">&#x2713;</text>
  <text x="80" y="170" text-anchor="end" font-family="system-ui, sans-serif"
        font-size="9" fill="#33aa33">&#x2713;</text>

  <!-- Ring freed — sitting to the right -->
  <circle cx="255" cy="130" r="12" fill="none" stroke="#cc8800" stroke-width="2.5"/>
  <text x="255" y="155" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#cc8800">ring (free)</text>

  <!-- Exit path arrow -->
  <path d="M 170,100 Q 200,90 235,118"
        fill="none" stroke="#33aa33" stroke-width="1.5" stroke-dasharray="4,2"
        marker-end="url(#exitArrow)"/>
  <text x="210" y="85" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#33aa33">exit path</text>

  <!-- Color labels on arcs -->
  <text x="150" y="68" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#dd3333">red</text>
  <text x="225" y="175" font-family="system-ui, sans-serif"
        font-size="8" fill="#3333dd">blue</text>
  <text x="63" y="175" text-anchor="end" font-family="system-ui, sans-serif"
        font-size="8" fill="#ddcc33">yellow</text>

  <!-- Explanation -->
  <text x="150" y="250" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">Valid tricoloring proves trefoil is non-trivial.</text>
  <text x="150" y="265" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">Ring exits at the arc color boundary.</text>

  <!-- Legend -->
  <line x1="20" y1="295" x2="50" y2="295" stroke="#dd3333" stroke-width="3"/>
  <text x="58" y="299" font-family="system-ui, sans-serif" font-size="9" fill="#666">red arc</text>

  <line x1="20" y1="310" x2="50" y2="310" stroke="#3333dd" stroke-width="3"/>
  <text x="58" y="314" font-family="system-ui, sans-serif" font-size="9" fill="#666">blue arc</text>

  <line x1="20" y1="325" x2="50" y2="325" stroke="#ddcc33" stroke-width="3"/>
  <text x="58" y="329" font-family="system-ui, sans-serif" font-size="9" fill="#666">yellow arc</text>

  <line x1="170" y1="325" x2="200" y2="325" stroke="#33aa33" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="208" y="329" font-family="system-ui, sans-serif" font-size="9" fill="#666">exit path</text>
</svg>