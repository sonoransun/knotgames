<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <title>The Tricolor Lock - Setup</title>
  <desc>Trefoil knot diagram with three arcs visible. Crossings show over/under gaps. Ring threaded on the trefoil. Arcs are gray (uncolored).</desc>

  <rect width="300" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="150" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">The Tricolor Lock — Setup</text>
  <text x="150" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">trefoil uncolored, ring threaded</text>

  <!-- Trefoil knot: three arcs with crossing gaps -->
  <!-- Arc 1: top-left to top-right (goes over at top crossing) -->
  <path d="M 90,100 Q 80,80 100,70 Q 130,55 150,65 Q 170,55 200,70 Q 220,80 210,100"
        fill="none" stroke="#888" stroke-width="3" stroke-linecap="round"/>

  <!-- Arc 2: top-right down to bottom (goes over at right crossing) -->
  <path d="M 210,100 Q 230,130 210,165 Q 195,190 170,200 Q 150,210 140,200"
        fill="none" stroke="#888" stroke-width="3" stroke-linecap="round"/>

  <!-- Arc 3: bottom up to top-left (goes over at left crossing) -->
  <path d="M 140,200 Q 120,210 105,190 Q 85,165 70,130 Q 60,110 90,100"
        fill="none" stroke="#888" stroke-width="3" stroke-linecap="round"/>

  <!-- Crossing gaps (white break to show under-strand) -->
  <!-- Crossing 1: top center -->
  <line x1="145" y1="75" x2="155" y2="65" stroke="#fafafa" stroke-width="8"/>
  <path d="M 130,95 Q 150,60 170,95" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Crossing 2: right -->
  <line x1="195" y1="140" x2="205" y2="150" stroke="#fafafa" stroke-width="8"/>
  <path d="M 220,120 Q 190,155 210,180" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Crossing 3: left -->
  <line x1="95" y1="140" x2="85" y2="150" stroke="#fafafa" stroke-width="8"/>
  <path d="M 80,120 Q 100,155 75,180" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Arc labels -->
  <text x="150" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="9" fill="#666">arc 1</text>
  <text x="235" y="155" text-anchor="start" font-family="system-ui, sans-serif"
        font-size="9" fill="#666">arc 2</text>
  <text x="42" y="155" text-anchor="end" font-family="system-ui, sans-serif"
        font-size="9" fill="#666">arc 3</text>

  <!-- Ring threaded on trefoil (on arc 1) -->
  <ellipse cx="120" cy="78" rx="12" ry="8" fill="none" stroke="#cc8800" stroke-width="2.5"
           transform="rotate(-15, 120, 78)"/>
  <text x="120" y="60" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#cc8800">ring</text>

  <!-- Crossing labels -->
  <circle cx="150" cy="80" r="10" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="150" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="7" fill="#999">c1</text>

  <circle cx="200" cy="145" r="10" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="200" y="148" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="7" fill="#999">c2</text>

  <circle cx="90" cy="145" r="10" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="90" y="148" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="7" fill="#999">c3</text>

  <!-- Question marks for uncolored state -->
  <text x="150" y="240" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#999">Assign 3 colors to 3 arcs</text>
  <text x="150" y="255" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">such that each crossing is valid</text>

  <!-- Legend -->
  <line x1="20" y1="295" x2="50" y2="295" stroke="#888" stroke-width="3"/>
  <text x="58" y="299" font-family="system-ui, sans-serif" font-size="9" fill="#666">trefoil wire (uncolored)</text>

  <line x1="20" y1="310" x2="50" y2="310" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="58" y="314" font-family="system-ui, sans-serif" font-size="9" fill="#666">under-strand at crossing</text>

  <ellipse cx="35" cy="328" rx="10" ry="6" fill="none" stroke="#cc8800" stroke-width="2"/>
  <text x="58" y="332" font-family="system-ui, sans-serif" font-size="9" fill="#666">ring (threaded)</text>
</svg>