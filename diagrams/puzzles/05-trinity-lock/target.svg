<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300">
  <title>Trinity Lock -- Borromean Configuration Target</title>
  <desc>Three elliptical ovals in Borromean configuration: A (Red) over B (Blue), B over C (Yellow), C over A. No two are linked, but all three are inseparable.</desc>

  <rect width="350" height="300" fill="#fafafa"/>

  <defs>
    <!-- Drop shadow filter for over-strands -->
    <filter id="overStrandShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Oval paths: elongated ellipses (~2:1 aspect ratio), each rotated differently -->
    <ellipse id="ovalA-shape" cx="175" cy="130" rx="110" ry="50"/>
    <ellipse id="ovalB-shape" cx="175" cy="130" rx="110" ry="50"/>
    <ellipse id="ovalC-shape" cx="175" cy="130" rx="110" ry="50"/>
  </defs>

  <!--
    Borromean crossing convention:
      A over B  (Red over Blue)
      B over C  (Blue over Yellow)
      C over A  (Yellow over Red)

    Drawing order for each crossing uses the white-gap technique:
    Under-strand segment drawn first with thick white stroke, then over-strand on top.

    We draw full ovals as paths and layer the crossings.
  -->

  <!-- === LAYER 1: Full strokes at base === -->

  <!-- Oval C (Yellow) - full stroke, bottom layer -->
  <ellipse cx="175" cy="130" rx="110" ry="50"
           transform="rotate(-55,175,130)"
           fill="none" stroke="#ca4" stroke-width="2.5"/>

  <!-- Oval B (Blue) - full stroke -->
  <ellipse cx="175" cy="130" rx="110" ry="50"
           transform="rotate(55,175,130)"
           fill="none" stroke="#44c" stroke-width="2.5"/>

  <!-- Oval A (Red) - full stroke -->
  <ellipse cx="175" cy="130" rx="110" ry="50"
           transform="rotate(0,175,130)"
           fill="none" stroke="#c44" stroke-width="2.5"/>

  <!-- === LAYER 2: White gaps for under-strands (10px), then over-strands with shadow === -->

  <!-- Crossing 1: A over B (top-right area, ~x=240,y=95) -->
  <!-- B goes under: white gap on B -->
  <line x1="230" y1="78" x2="250" y2="100"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- A goes over: redraw A segment with shadow -->
  <line x1="222" y1="85" x2="258" y2="93"
        stroke="#c44" stroke-width="2.5" stroke-linecap="round"
        filter="url(#overStrandShadow)"/>

  <!-- Crossing 2: A over B (bottom-left area, ~x=110,y=165) -->
  <line x1="98" y1="152" x2="120" y2="175"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <line x1="92" y1="167" x2="128" y2="160"
        stroke="#c44" stroke-width="2.5" stroke-linecap="round"
        filter="url(#overStrandShadow)"/>

  <!-- Crossing 3: B over C (top-left area, ~x=110,y=95) -->
  <!-- C goes under: white gap on C -->
  <line x1="98" y1="78" x2="120" y2="100"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- B goes over: redraw B segment with shadow -->
  <line x1="92" y1="93" x2="128" y2="85"
        stroke="#44c" stroke-width="2.5" stroke-linecap="round"
        filter="url(#overStrandShadow)"/>

  <!-- Crossing 4: B over C (bottom-right area, ~x=240,y=165) -->
  <line x1="230" y1="152" x2="252" y2="175"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <line x1="222" y1="160" x2="258" y2="167"
        stroke="#44c" stroke-width="2.5" stroke-linecap="round"
        filter="url(#overStrandShadow)"/>

  <!-- Crossing 5: C over A (right area, ~x=280,y=130) -->
  <!-- A goes under: white gap on A -->
  <line x1="270" y1="122" x2="286" y2="138"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- C goes over: redraw C segment with shadow -->
  <line x1="266" y1="126" x2="290" y2="134"
        stroke="#ca4" stroke-width="2.5" stroke-linecap="round"
        filter="url(#overStrandShadow)"/>

  <!-- Crossing 6: C over A (left area, ~x=70,y=130) -->
  <line x1="62" y1="122" x2="78" y2="138"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <line x1="58" y1="134" x2="82" y2="126"
        stroke="#ca4" stroke-width="2.5" stroke-linecap="round"
        filter="url(#overStrandShadow)"/>

  <!-- === LABELS === -->
  <!-- Label A (Red) -->
  <text x="290" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#666">A (Red)</text>

  <!-- Label B (Blue) -->
  <text x="10" y="82" font-family="system-ui, sans-serif" font-size="10" fill="#666">B (Blue)</text>

  <!-- Label C (Yellow) -->
  <text x="155" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#666">C (Yellow)</text>

  <!-- Title text -->
  <text x="175" y="24" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">
    Trinity Lock -- Borromean Configuration
  </text>

  <!-- Crossing pattern note -->
  <text x="175" y="258" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#999">
    Over-under pattern: A over B, B over C, C over A
  </text>

  <!-- Additional note -->
  <text x="175" y="278" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#999">
    No pair is linked, yet all three are inseparable
  </text>
</svg>