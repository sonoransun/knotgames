<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380">
  <title>Satellite Trap — Cutaway Layer View</title>
  <desc>Cross-section of the torus shell showing the trefoil-knotted internal tunnel (companion) and the cord pattern threaded through it. The two rings are trapped at different layers: outer ring linked to the pattern (freeable), inner ring linked to the companion (permanent).</desc>

  <rect width="540" height="380" fill="#fafafa"/>

  <text x="270" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">Satellite knot — two independent topological layers</text>

  <!-- ============================================================ -->
  <!-- LEFT: cutaway view of torus + companion + cord              -->
  <!-- ============================================================ -->
  <g transform="translate(40, 50)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555" font-weight="bold">Cutaway side view</text>

    <!-- Outer torus (semi-transparent shell) -->
    <ellipse cx="120" cy="160" rx="110" ry="70"
             fill="#aaccee" fill-opacity="0.10" stroke="#446" stroke-width="2"/>
    <ellipse cx="120" cy="160" rx="60" ry="20"
             fill="#fafafa" fill-opacity="1" stroke="#446" stroke-width="2"/>

    <!-- Cutaway hint: dashed line on the right showing the cut -->
    <path d="M 120,90 Q 230,160 120,230"
          fill="none" stroke="#888" stroke-width="0.7" stroke-dasharray="3,2"/>

    <!-- The trefoil-knotted internal tunnel (companion knot) drawn winding inside -->
    <!-- We approximate the trefoil winding as 3 lobes inside the torus -->
    <g stroke="#c44" stroke-width="2.5" fill="none">
      <path d="M 50,150 Q 60,120 90,130 Q 130,140 130,170 Q 130,200 100,200 Q 70,200 60,180" />
      <path d="M 95,135 Q 130,115 165,140" />
      <path d="M 165,140 Q 195,170 175,200 Q 145,210 120,200" />
      <path d="M 90,180 Q 110,160 130,180" />
    </g>
    <text x="200" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#c44" font-weight="bold">Companion</text>
    <text x="200" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#c44">(trefoil tunnel</text>
    <text x="200" y="139" font-family="system-ui, sans-serif" font-size="9" fill="#c44">inside the shell)</text>

    <!-- Inner ring (trapped by companion — drawn small, inside the trefoil region) -->
    <ellipse cx="115" cy="170" rx="14" ry="6"
             fill="none" stroke="#888" stroke-width="2"/>
    <text x="115" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#888">inner</text>
    <text x="115" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#a40" font-weight="bold">TRAPPED</text>

    <!-- External cord (pattern) -->
    <g stroke="#44c" stroke-width="2" fill="none">
      <path d="M 5,120 Q 30,90 60,95 Q 90,100 100,90" />
      <path d="M 145,90 Q 200,80 235,110 Q 250,140 235,170 Q 200,200 150,210" />
      <path d="M 90,215 Q 60,225 30,210 Q 5,195 10,170" />
    </g>
    <text x="-30" y="80" font-family="system-ui, sans-serif" font-size="10" fill="#44c" font-weight="bold">Pattern</text>
    <text x="-30" y="93" font-family="system-ui, sans-serif" font-size="9" fill="#44c">(external cord</text>
    <text x="-30" y="104" font-family="system-ui, sans-serif" font-size="9" fill="#44c">through tunnel)</text>

    <!-- Outer ring (linked to pattern only) -->
    <ellipse cx="200" cy="190" rx="18" ry="8"
             fill="none" stroke="#0a6" stroke-width="2.5"/>
    <text x="200" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0a6">outer</text>
    <text x="200" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#070" font-weight="bold">FREEABLE</text>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT: layer separation diagram                             -->
  <!-- ============================================================ -->
  <g transform="translate(330, 50)">
    <text x="100" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555" font-weight="bold">Independent layers</text>

    <!-- Companion layer box -->
    <rect x="0" y="20" width="200" height="80" rx="6"
          fill="#fff5f5" stroke="#c44" stroke-width="1.5"/>
    <text x="100" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c44" font-weight="bold">Companion (fixed)</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">The trefoil-knotted tunnel</text>
    <text x="100" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">inside the torus shell.</text>
    <text x="100" y="91" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#a40" font-style="italic">Cannot be changed.</text>

    <!-- + sign -->
    <text x="100" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#666" font-weight="bold">+</text>

    <!-- Pattern layer box -->
    <rect x="0" y="135" width="200" height="80" rx="6"
          fill="#f5f5ff" stroke="#44c" stroke-width="1.5"/>
    <text x="100" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#44c" font-weight="bold">Pattern (mutable)</text>
    <text x="100" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">The cord routed through</text>
    <text x="100" y="189" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">the tunnel and externally.</text>
    <text x="100" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#070" font-style="italic">Reroute to free outer ring.</text>

    <!-- = Satellite -->
    <text x="100" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444" font-weight="bold">= Satellite knot</text>
  </g>

  <!-- Bottom caption -->
  <text x="270" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#444" font-weight="bold">JSJ decomposition strategy:</text>
  <text x="270" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">Each ring is trapped by a different layer. Solve each layer independently.</text>
  <text x="270" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">The outer ring's freedom depends only on the pattern — change the cord route at the surface ports.</text>
  <text x="270" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">The inner ring is trapped by the companion (the trefoil tunnel) and cannot be freed without breaking the shell.</text>
</svg>
