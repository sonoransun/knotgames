<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 400">
  <title>The Satellite Trap - Setup</title>
  <desc>Top-down view of torus shell (two concentric ellipses). Internal tunnel shown as red dashed path (trefoil pattern). External cord shown as blue path. Port markers (yellow circles) where cord exits. Inner ring inside torus, outer ring on external cord.</desc>

  <rect width="350" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="175" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">The Satellite Trap — Setup</text>
  <text x="175" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#999">top-down view of torus shell</text>

  <!-- Torus shell: outer ellipse -->
  <ellipse cx="175" cy="190" rx="130" ry="85" fill="none" stroke="#888" stroke-width="2.5"/>

  <!-- Torus shell: inner ellipse (hole) -->
  <ellipse cx="175" cy="190" rx="45" ry="30" fill="none" stroke="#888" stroke-width="2"/>

  <!-- Internal tunnel: trefoil pattern (red dashed) -->
  <!-- The companion knot lives inside the torus shell -->
  <path d="M 80,150 Q 60,170 80,195 Q 100,220 130,210"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 130,210 Q 155,200 165,170 Q 175,140 200,140"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 200,140 Q 230,140 250,165 Q 270,190 250,215"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 250,215 Q 230,240 200,235 Q 170,230 155,210"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 155,210 Q 140,190 120,175 Q 100,160 80,150"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Tunnel crossing indicators -->
  <circle cx="145" cy="195" r="4" fill="#fafafa" stroke="#dd3333" stroke-width="1"/>
  <circle cx="185" cy="155" r="4" fill="#fafafa" stroke="#dd3333" stroke-width="1"/>
  <circle cx="225" cy="210" r="4" fill="#fafafa" stroke="#dd3333" stroke-width="1"/>

  <!-- Port markers (yellow circles where cord enters/exits torus) -->
  <circle cx="75" cy="150" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <text x="58" y="145" text-anchor="end" font-family="system-ui, sans-serif"
        font-size="7" fill="#ddcc33">port A</text>

  <circle cx="250" cy="145" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <text x="268" y="140" font-family="system-ui, sans-serif"
        font-size="7" fill="#ddcc33">port B</text>

  <circle cx="275" cy="215" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <text x="290" y="212" font-family="system-ui, sans-serif"
        font-size="7" fill="#ddcc33">port C</text>

  <circle cx="100" cy="235" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <text x="83" y="240" text-anchor="end" font-family="system-ui, sans-serif"
        font-size="7" fill="#ddcc33">port D</text>

  <!-- External cord (blue, solid — satellite pattern) -->
  <!-- Cord exits port A, loops externally, enters port B -->
  <path d="M 69,150 Q 40,120 60,90 Q 90,65 150,60 Q 220,55 260,80 Q 285,100 256,145"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>

  <!-- Cord exits port B, goes to port C externally -->
  <path d="M 256,145 Q 290,160 281,215"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>

  <!-- Cord exits port C, loops to port D -->
  <path d="M 275,221 Q 260,270 200,285 Q 140,295 100,270 Q 80,255 94,235"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>

  <!-- Cord exits port D back to port A -->
  <path d="M 94,235 Q 65,220 60,190 Q 55,165 69,150"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>

  <!-- Inner ring (inside torus, on the tunnel) -->
  <circle cx="160" cy="180" r="8" fill="none" stroke="#cc8800" stroke-width="2.5"/>
  <text x="160" y="170" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="7" fill="#cc8800">inner ring</text>

  <!-- Outer ring (on external cord) -->
  <circle cx="150" cy="65" r="8" fill="none" stroke="#cc8800" stroke-width="2.5"/>
  <text x="150" y="55" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="7" fill="#cc8800">outer ring</text>

  <!-- Labels -->
  <text x="175" y="195" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#dd3333">companion</text>
  <text x="175" y="205" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#dd3333">(trefoil tunnel)</text>

  <text x="55" y="85" font-family="system-ui, sans-serif"
        font-size="8" fill="#2255aa">pattern</text>
  <text x="55" y="95" font-family="system-ui, sans-serif"
        font-size="8" fill="#2255aa">(external cord)</text>

  <!-- Legend -->
  <line x1="20" y1="330" x2="50" y2="330" stroke="#888" stroke-width="2.5"/>
  <text x="58" y="334" font-family="system-ui, sans-serif" font-size="9" fill="#666">torus shell</text>

  <line x1="20" y1="345" x2="50" y2="345" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="58" y="349" font-family="system-ui, sans-serif" font-size="9" fill="#666">internal tunnel (companion)</text>

  <line x1="20" y1="360" x2="50" y2="360" stroke="#2255aa" stroke-width="2.5"/>
  <text x="58" y="364" font-family="system-ui, sans-serif" font-size="9" fill="#666">external cord (pattern)</text>

  <circle cx="35" cy="378" r="5" fill="none" stroke="#ddcc33" stroke-width="2"/>
  <text x="58" y="382" font-family="system-ui, sans-serif" font-size="9" fill="#666">port (entry/exit)</text>

  <circle cx="200" cy="378" r="5" fill="none" stroke="#cc8800" stroke-width="2"/>
  <text x="213" y="382" font-family="system-ui, sans-serif" font-size="9" fill="#666">ring</text>
</svg>