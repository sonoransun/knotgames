<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 400">
  <title>The Satellite Trap - Solved</title>
  <desc>Same torus view. External cord rerouted (different path). Outer ring freed and moved away. Inner ring still trapped. Labels: Outer: FREE and Inner: TRAPPED.</desc>

  <defs>
    <marker id="freeArrow" markerWidth="6" markerHeight="4" refX="3" refY="2"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#33aa33"/>
    </marker>
  </defs>

  <rect width="350" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="175" y="25" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">The Satellite Trap — Solved</text>
  <text x="175" y="42" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#33aa33">pattern rerouted, outer ring freed</text>

  <!-- Torus shell: outer ellipse -->
  <ellipse cx="175" cy="200" rx="130" ry="85" fill="none" stroke="#888" stroke-width="2.5"/>

  <!-- Torus shell: inner ellipse (hole) -->
  <ellipse cx="175" cy="200" rx="45" ry="30" fill="none" stroke="#888" stroke-width="2"/>

  <!-- Internal tunnel: trefoil pattern (red dashed — unchanged) -->
  <path d="M 80,160 Q 60,180 80,205 Q 100,230 130,220"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 130,220 Q 155,210 165,180 Q 175,150 200,150"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 200,150 Q 230,150 250,175 Q 270,200 250,225"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 250,225 Q 230,250 200,245 Q 170,240 155,220"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 155,220 Q 140,200 120,185 Q 100,170 80,160"
        fill="none" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Tunnel crossings -->
  <circle cx="145" cy="205" r="4" fill="#fafafa" stroke="#dd3333" stroke-width="1"/>
  <circle cx="185" cy="165" r="4" fill="#fafafa" stroke="#dd3333" stroke-width="1"/>
  <circle cx="225" cy="220" r="4" fill="#fafafa" stroke="#dd3333" stroke-width="1"/>

  <!-- Port markers -->
  <circle cx="75" cy="160" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <circle cx="250" cy="155" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <circle cx="275" cy="225" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>
  <circle cx="100" cy="245" r="6" fill="none" stroke="#ddcc33" stroke-width="2.5"/>

  <!-- External cord: REROUTED (simpler path, no longer entangling the outer ring) -->
  <!-- Cord now takes a direct path between ports, not looping wide -->
  <path d="M 69,160 Q 50,140 55,120 Q 65,100 100,95 Q 200,80 260,100 Q 280,115 256,155"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>
  <path d="M 256,155 Q 270,180 281,225"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>
  <path d="M 275,231 Q 250,265 175,275 Q 110,278 94,255 Q 88,248 94,245"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>
  <path d="M 94,245 Q 70,230 60,200 Q 52,175 69,160"
        fill="none" stroke="#2255aa" stroke-width="2.5"/>

  <!-- "Rerouted" label on external cord -->
  <text x="280" y="90" font-family="system-ui, sans-serif"
        font-size="8" fill="#2255aa">rerouted</text>
  <text x="280" y="100" font-family="system-ui, sans-serif"
        font-size="8" fill="#2255aa">path</text>

  <!-- Inner ring (STILL TRAPPED inside torus) -->
  <circle cx="160" cy="190" r="8" fill="none" stroke="#cc8800" stroke-width="2.5"/>

  <!-- Inner ring label with TRAPPED indicator -->
  <rect x="110" y="173" width="70" height="14" rx="2" fill="#ffeeee" stroke="#dd3333" stroke-width="0.5"/>
  <text x="145" y="183" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#dd3333" font-weight="bold">Inner: TRAPPED</text>

  <!-- Outer ring: FREED, moved away from torus -->
  <circle cx="310" cy="55" r="10" fill="none" stroke="#cc8800" stroke-width="2.5"/>

  <!-- Outer ring label with FREE indicator -->
  <rect x="270" y="70" width="80" height="14" rx="2" fill="#eeffee" stroke="#33aa33" stroke-width="0.5"/>
  <text x="310" y="80" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="8" fill="#33aa33" font-weight="bold">Outer: FREE</text>

  <!-- Arrow showing outer ring freed -->
  <path d="M 200,80 Q 250,55 298,55"
        fill="none" stroke="#33aa33" stroke-width="1.5" stroke-dasharray="4,2"
        marker-end="url(#freeArrow)"/>
  <text x="245" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="7" fill="#33aa33">freed</text>

  <!-- Explanation -->
  <text x="175" y="310" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">Companion (trefoil) is fixed — traps inner ring.</text>
  <text x="175" y="325" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">Pattern (cord) was rerouted — frees outer ring.</text>

  <!-- Legend -->
  <line x1="20" y1="350" x2="50" y2="350" stroke="#888" stroke-width="2.5"/>
  <text x="58" y="354" font-family="system-ui, sans-serif" font-size="9" fill="#666">torus shell</text>

  <line x1="20" y1="365" x2="50" y2="365" stroke="#dd3333" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="58" y="369" font-family="system-ui, sans-serif" font-size="9" fill="#666">companion tunnel (fixed)</text>

  <line x1="20" y1="380" x2="50" y2="380" stroke="#2255aa" stroke-width="2.5"/>
  <text x="58" y="384" font-family="system-ui, sans-serif" font-size="9" fill="#666">external cord (rerouted)</text>

  <line x1="200" y1="380" x2="230" y2="380" stroke="#33aa33" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="238" y="384" font-family="system-ui, sans-serif" font-size="9" fill="#666">freed path</text>
</svg>