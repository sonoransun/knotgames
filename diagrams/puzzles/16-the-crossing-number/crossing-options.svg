<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <title>Crossing Options</title>
  <desc>Table showing results of flipping each crossing: Flip A produces trefoil, Flip B produces 5_1 knot, Flip C produces unknot, Flip D produces trefoil. Crossing C highlighted in green.</desc>

  <rect width="400" height="300" fill="#fafafa"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="13" fill="#666" font-weight="bold">Crossing Flip Options</text>

  <!-- Table structure -->
  <!-- Header row -->
  <rect x="20" y="35" width="360" height="22" fill="#eee" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Flip</text>
  <text x="170" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Diagram</text>
  <text x="290" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Result</text>
  <text x="360" y="50" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666" font-weight="bold">Free?</text>

  <!-- Row 1: Flip A → trefoil -->
  <rect x="20" y="57" width="360" height="45" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#dd3333" font-weight="bold">A</text>

  <!-- Small trefoil diagram -->
  <path d="M 160,70 C 155,68 150,72 155,78 C 160,84 170,84 175,78 C 180,72 175,68 170,70"
        fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="163" y1="73" x2="167" y2="73" stroke="#888" stroke-width="1.5"/>
  <line x1="157" y1="80" x2="161" y2="77" stroke="#888" stroke-width="1.5"/>
  <line x1="170" y1="80" x2="166" y2="77" stroke="#888" stroke-width="1.5"/>

  <text x="290" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">trefoil (3 crossings)</text>
  <text x="360" y="83" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="14" fill="#dd3333">&#x2717;</text>

  <!-- Row 2: Flip B → 5_1 knot -->
  <rect x="20" y="102" width="360" height="45" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="128" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#dd3333" font-weight="bold">B</text>

  <!-- Small complex knot diagram -->
  <path d="M 155,115 Q 150,120 155,128 Q 162,135 170,128 Q 178,120 175,115 Q 170,110 162,112 Q 155,115 155,115"
        fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="160" cy="120" r="2" fill="#fafafa" stroke="#888" stroke-width="0.5"/>
  <circle cx="168" cy="122" r="2" fill="#fafafa" stroke="#888" stroke-width="0.5"/>

  <text x="290" y="128" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">5&#x2081; knot (5 crossings)</text>
  <text x="360" y="128" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="14" fill="#dd3333">&#x2717;</text>

  <!-- Row 3: Flip C → unknot (WINNER) -->
  <rect x="20" y="147" width="360" height="45" fill="#eeffee" stroke="#33aa33" stroke-width="1.5"/>
  <text x="60" y="173" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#33aa33" font-weight="bold">C</text>

  <!-- Simple circle for unknot -->
  <circle cx="170" cy="170" r="12" fill="none" stroke="#33aa33" stroke-width="2"/>

  <text x="290" y="173" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#33aa33" font-weight="bold">unknot (0 crossings)</text>
  <text x="360" y="173" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="14" fill="#33aa33">&#x2713;</text>

  <!-- Row 4: Flip D → trefoil -->
  <rect x="20" y="192" width="360" height="45" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="60" y="218" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#dd3333" font-weight="bold">D</text>

  <!-- Small trefoil diagram -->
  <path d="M 160,208 C 155,206 150,210 155,216 C 160,222 170,222 175,216 C 180,210 175,206 170,208"
        fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="163" y1="211" x2="167" y2="211" stroke="#888" stroke-width="1.5"/>
  <line x1="157" y1="218" x2="161" y2="215" stroke="#888" stroke-width="1.5"/>
  <line x1="170" y1="218" x2="166" y2="215" stroke="#888" stroke-width="1.5"/>

  <text x="290" y="218" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="10" fill="#666">trefoil (3 crossings)</text>
  <text x="360" y="218" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="14" fill="#dd3333">&#x2717;</text>

  <!-- Conclusion box -->
  <rect x="30" y="248" width="340" height="28" rx="4" fill="#f0f0ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="200" y="266" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="11" fill="#666">Unknotting number of figure-eight = 1 (flip crossing C)</text>

  <!-- Legend -->
  <text x="60" y="292" font-family="system-ui, sans-serif" font-size="9" fill="#33aa33">Green row = correct choice (unknots the knot)</text>
  <text x="60" y="298" font-family="system-ui, sans-serif" font-size="8" fill="#999">&#x2713; = ring can be freed, &#x2717; = still knotted</text>
</svg>