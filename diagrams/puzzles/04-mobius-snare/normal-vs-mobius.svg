<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220">
  <title>Normal Band vs Mobius Band Comparison</title>
  <desc>Side-by-side comparison showing why a cord is trapped in a normal band (2 boundary components) but can escape from a Mobius band (1 boundary component).</desc>

  <rect width="500" height="220" fill="#fafafa"/>

  <!-- Divider -->
  <line x1="250" y1="10" x2="250" y2="210"
        stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== LEFT: Normal band (0 twists) ===== -->
  <text x="125" y="22" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Normal band (0 twists)</text>

  <!-- Band as rounded rectangle loop -->
  <!-- Top edge (Edge A - Red) -->
  <path d="M 40,55 L 210,55 C 225,55 225,65 225,70 L 225,90 C 225,95 225,105 210,105 L 40,105 C 25,105 25,95 25,90 L 25,70 C 25,65 25,55 40,55 Z"
        stroke="#c44" stroke-width="2" fill="none"/>
  <!-- Inner edge showing the band width (Edge B - Blue) -->
  <path d="M 45,65 L 205,65 C 213,65 215,70 215,75 L 215,85 C 215,90 213,95 205,95 L 45,95 C 37,95 35,90 35,85 L 35,75 C 35,70 37,65 45,65 Z"
        stroke="#44c" stroke-width="1.5" fill="none"/>

  <!-- Edge labels -->
  <text x="125" y="50" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#c44">Edge A</text>
  <text x="125" y="118" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#44c">Edge B</text>

  <!-- Cord trapped between edges (blue cord) -->
  <path d="M 55,80 L 195,80"
        stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <!-- Small X marks showing trapped -->
  <line x1="120" y1="73" x2="130" y2="87" stroke="#999" stroke-width="1"/>
  <line x1="130" y1="73" x2="120" y2="87" stroke="#999" stroke-width="1"/>

  <text x="125" y="140" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">cord is trapped</text>
  <text x="125" y="152" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">between edges</text>

  <!-- Summary -->
  <text x="125" y="176" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#333" font-weight="bold">2 boundary components</text>
  <text x="125" y="194" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#333">Cord cannot escape</text>

  <!-- ===== RIGHT: Mobius band (half-twist) ===== -->
  <text x="375" y="22" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Mobius band (half-twist)</text>

  <!-- Band with twist on right side -->
  <!-- Top portion (Red edge on top, Blue edge on bottom) -->
  <path d="M 290,55 L 440,55"
        stroke="#c44" stroke-width="2" fill="none"/>
  <!-- Bottom portion -->
  <path d="M 290,105 L 440,105"
        stroke="#c44" stroke-width="2" fill="none"/>

  <!-- Left side: normal connection -->
  <path d="M 290,55 C 275,55 270,65 270,80 C 270,95 275,105 290,105"
        stroke="#c44" stroke-width="2" fill="none"/>

  <!-- Inner edges (left side normal - Blue) -->
  <path d="M 295,65 L 435,65"
        stroke="#44c" stroke-width="1.5" fill="none"/>
  <path d="M 295,95 L 435,95"
        stroke="#44c" stroke-width="1.5" fill="none"/>
  <path d="M 295,65 C 285,65 280,72 280,80 C 280,88 285,95 295,95"
        stroke="#44c" stroke-width="1.5" fill="none"/>

  <!-- Right side: half-twist (edges cross) -->
  <!-- Red outer top connects to blue inner bottom -->
  <path d="M 440,55 C 455,55 460,68 458,80 C 456,90 452,95 445,95"
        stroke="#c44" stroke-width="2" fill="none"/>
  <!-- Blue inner top connects to red outer bottom -->
  <path d="M 435,65 C 448,65 452,72 452,80 C 452,88 448,95 440,105"
        stroke="#44c" stroke-width="1.5" fill="none"/>
  <!-- White gap for crossing (10px) -->
  <line x1="445" y1="76" x2="451" y2="86"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- Redraw the over-strand (red) after gap -->
  <path d="M 440,55 C 455,55 460,68 458,80 C 456,90 452,95 445,95"
        stroke="#c44" stroke-width="2" fill="none"/>
  <path d="M 445,95 C 445,95 435,95 435,95"
        stroke="#44c" stroke-width="1.5" fill="none"/>

  <!-- Twist annotation -->
  <line x1="460" y1="80" x2="478" y2="72"
        stroke="#999" stroke-width="1"/>
  <text x="468" y="66" font-family="system-ui, sans-serif" font-size="9" fill="#666">twist</text>

  <!-- Single edge label -->
  <text x="365" y="50" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#c44">Edge A</text>
  <path d="M 345,53 C 340,58 338,66 340,70"
        stroke="#999" stroke-width="0.8" fill="none"
        marker-end="url(#arrowThin)"/>
  <text x="375" y="118" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#c44">(same edge wraps around)</text>

  <defs>
    <marker id="arrowThin" markerWidth="6" markerHeight="5" refX="6" refY="2.5"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 6,2.5 L 0,5 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Cord passing through (blue cord), with escape arrow -->
  <path d="M 305,80 L 420,80"
        stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <!-- Arrow showing cord can slip off -->
  <path d="M 410,80 C 425,78 435,70 440,55"
        stroke="#999" stroke-width="1.2" fill="none" stroke-dasharray="2,2"
        marker-end="url(#arrowThin)"/>

  <text x="375" y="140" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">cord can slide off</text>
  <text x="375" y="152" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#666">the single edge</text>

  <!-- Summary -->
  <text x="375" y="176" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#333" font-weight="bold">1 boundary component</text>
  <text x="375" y="194" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#333">Cord can escape</text>
</svg>