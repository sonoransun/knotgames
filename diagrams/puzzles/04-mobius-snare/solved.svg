<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250">
  <title>Mobius Snare - Solved</title>
  <desc>The Mobius band unchanged, with the ring and cord completely separated below it.</desc>

  <rect width="350" height="250" fill="#fafafa"/>

  <!-- Mobius band: identical to setup, unchanged -->
  <!-- Back portion of band (red outer edge) -->
  <path d="M 90,55 C 90,25 260,25 260,55"
        stroke="#c44" stroke-width="2" fill="none"/>
  <!-- Blue inner edge of back -->
  <path d="M 100,60 C 100,35 250,35 250,60"
        stroke="#44c" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Left side (red outer) -->
  <path d="M 90,55 L 90,95"
        stroke="#c44" stroke-width="2" fill="none"/>
  <!-- Left side (blue inner) -->
  <path d="M 100,60 L 100,90"
        stroke="#44c" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Right side with half-twist -->
  <!-- Red edge crosses to inner -->
  <path d="M 260,55 C 260,70 250,75 250,95"
        stroke="#c44" stroke-width="2" fill="none"/>
  <!-- Blue edge crosses to outer -->
  <path d="M 250,60 C 250,70 260,75 260,95"
        stroke="#44c" stroke-width="2" fill="none"/>
  <!-- Crossing gap (10px) -->
  <line x1="253" y1="69" x2="257" y2="77"
        stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <!-- Redraw over-strand (red) -->
  <path d="M 260,55 C 260,70 250,75 250,95"
        stroke="#c44" stroke-width="2" fill="none"/>

  <!-- Bottom portion of band (front) -->
  <!-- Blue edge (twisted from top red) -->
  <path d="M 90,95 C 90,125 260,125 260,95"
        stroke="#44c" stroke-width="2" fill="none"/>
  <!-- Red edge (twisted from top blue) -->
  <path d="M 100,90 C 100,120 250,120 250,95"
        stroke="#c44" stroke-width="2" fill="none"/>

  <!-- Label for band -->
  <text x="175" y="15" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">MOBIUS BAND (unchanged)</text>

  <!-- Separation gap -->
  <line x1="100" y1="145" x2="250" y2="145"
        stroke="#999" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Ring: free, below (brass) -->
  <circle cx="140" cy="195" r="18" fill="none" stroke="#cc8800" stroke-width="2.5"/>

  <!-- Cord: free loop, separate from ring (blue) -->
  <ellipse cx="220" cy="195" rx="30" ry="14" fill="none"
           stroke="#2255aa" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Label -->
  <text x="175" y="240" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="12" fill="#666">Ring and cord free</text>

  <!-- Green checkmark / Solved indicator -->
  <circle cx="310" cy="30" r="16" fill="#4a4" opacity="0.15"/>
  <path d="M 300,30 L 307,38 L 322,22"
        stroke="#4a4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="310" y="56" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="10" fill="#4a4" font-weight="bold">Solved</text>
</svg>