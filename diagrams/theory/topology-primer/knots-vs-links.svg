<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220">
  <title>Knots vs Links</title>
  <desc>Comparison of a knot (single component, shown as a trefoil with three-fold symmetry and three crossings) and a link (two components, shown as a Hopf link with two interlocking ellipses). Crossings use the white-gap convention for over/under strand relationships.</desc>

  <!-- Background -->
  <rect width="480" height="220" fill="#fafafa" rx="8"/>

  <!-- Center divider -->
  <line x1="240" y1="20" x2="240" y2="200" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ================================================ -->
  <!-- LEFT: Trefoil knot (single component)            -->
  <!-- Center: (125, 105)                               -->
  <!-- ================================================ -->

  <text x="125" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">Knot</text>

  <!--
    Trefoil with three-fold rotational symmetry.
    Translated from the unknot-vs-trefoil.svg geometry
    (center 370,115) to new center (125,105): shift (-245, -10).

    Crossing points:
      C1 ~ (148, 88)  — between top petal and bottom-right petal
      C2 ~ (125, 138) — between bottom-right petal and bottom-left petal
      C3 ~ (102, 88)  — between bottom-left petal and top petal

    Petal tips:
      Top:          (125, 45)
      Bottom-right: (173, 140)
      Bottom-left:  (77, 140)
  -->

  <!-- Layer 1: Draw all 3 petal arcs as the base layer -->

  <!-- Top petal: C3 -> C1 (going through the top) -->
  <path d="M 102,88 C 92,68 100,45 125,45 C 150,45 158,68 148,88"
        fill="none" stroke="#2255aa" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom-right petal: C1 -> C2 (going through lower-right) -->
  <path d="M 148,88 C 165,102 180,128 173,140 C 166,152 145,148 125,138"
        fill="none" stroke="#2255aa" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom-left petal: C2 -> C3 (going through lower-left) -->
  <path d="M 125,138 C 105,148 84,152 77,140 C 70,128 85,102 102,88"
        fill="none" stroke="#2255aa" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 2: White gaps on the UNDER strands at each crossing -->

  <!-- Gap at C1: under-strand is bottom-right petal outgoing -->
  <path d="M 144,83 C 148,88 152,94 155,98"
        fill="none" stroke="#fafafa" stroke-width="7"
        stroke-linecap="round"/>

  <!-- Gap at C2: under-strand is bottom-left petal outgoing -->
  <path d="M 129,142 C 125,140 120,138 115,137"
        fill="none" stroke="#fafafa" stroke-width="7"
        stroke-linecap="round"/>

  <!-- Gap at C3: under-strand is top petal outgoing -->
  <path d="M 98,94 C 100,90 102,86 106,83"
        fill="none" stroke="#fafafa" stroke-width="7"
        stroke-linecap="round"/>

  <!-- Layer 3: Redraw the OVER strands on top of the gaps -->

  <!-- Over-strand at C1: top petal incoming half passes over -->
  <path d="M 140,58 C 150,68 152,82 148,88 C 144,94 138,98 135,100"
        fill="none" stroke="#2255aa" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Over-strand at C2: bottom-right petal incoming half passes over -->
  <path d="M 177,134 C 171,145 151,148 125,138 C 117,134 113,132 110,130"
        fill="none" stroke="#2255aa" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Over-strand at C3: bottom-left petal incoming half passes over -->
  <path d="M 83,138 C 77,130 75,108 102,88 C 108,84 113,80 117,77"
        fill="none" stroke="#2255aa" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trefoil labels -->
  <text x="125" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">Knot</text>
  <text x="125" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">one closed curve</text>

  <!-- ================================================ -->
  <!-- RIGHT: Hopf link (two components)                -->
  <!-- Center: (355, 105)                               -->
  <!-- ================================================ -->

  <text x="355" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">Link</text>

  <!--
    Hopf link: two interlocked ellipses tilted for a 3D look.

    Circle A (red): centered at (340, 105), rx=40, ry=30, tilted -20°
    Circle B (blue): centered at (370, 105), rx=40, ry=30, tilted +20°

    The two ellipses intersect at approximately two points.
    At the top crossing, Circle A (red) goes OVER Circle B (blue).
    At the bottom crossing, Circle B (blue) goes OVER Circle A (red).
    This alternating pattern is the standard Hopf link.
  -->

  <!-- Layer 1: Draw both full ellipses -->

  <!-- Circle A (red) - left ring, tilted left -->
  <ellipse cx="340" cy="105" rx="40" ry="28"
           fill="none" stroke="#cc4444" stroke-width="2.5"
           stroke-linecap="round"
           transform="rotate(-20, 340, 105)"/>

  <!-- Circle B (blue) - right ring, tilted right -->
  <ellipse cx="370" cy="105" rx="40" ry="28"
           fill="none" stroke="#4444cc" stroke-width="2.5"
           stroke-linecap="round"
           transform="rotate(20, 370, 105)"/>

  <!-- Layer 2: White gaps on under-strands at each crossing -->

  <!--
    Top crossing (~355, 82): Circle A (red) goes OVER.
    Gap out Circle B (blue) under-strand at the top crossing.
  -->
  <line x1="350" y1="77" x2="358" y2="86"
        stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!--
    Bottom crossing (~355, 128): Circle B (blue) goes OVER.
    Gap out Circle A (red) under-strand at the bottom crossing.
  -->
  <line x1="350" y1="124" x2="358" y2="133"
        stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Layer 3: Redraw over-strands -->

  <!-- At top crossing: redraw Circle A (red) over-strand -->
  <path d="M 348,72 C 353,80 356,88 357,94"
        fill="none" stroke="#cc4444" stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- At bottom crossing: redraw Circle B (blue) over-strand -->
  <path d="M 351,118 C 353,124 356,130 360,136"
        fill="none" stroke="#4444cc" stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Hopf link labels -->
  <text x="355" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">Link</text>
  <text x="355" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">two closed curves</text>

  <!-- ================================================ -->
  <!-- Bottom annotation                                -->
  <!-- ================================================ -->
  <text x="240" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#777">A knot is a single closed curve; a link has two or more components</text>
</svg>
