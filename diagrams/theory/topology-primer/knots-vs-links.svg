<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200">
  <title>Knots vs Links</title>
  <desc>Comparison of a knot (single component, shown as a trefoil) and a link (two components, shown as a Hopf link with two interlocking circles). Crossings use the white-gap convention.</desc>

  <rect width="450" height="200" fill="#fafafa"/>

  <!-- LEFT: Knot (Trefoil) -->
  <text x="115" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Knot (1 component)</text>

  <!-- Simplified trefoil at center (115, 95) -->
  <!-- Three lobes of the trefoil -->
  <!-- Top lobe -->
  <path d="M 115,60 C 90,35 65,55 85,80" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 85,80 C 95,95 100,103 105,110" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom-left lobe -->
  <path d="M 105,110 C 90,130 65,138 65,115" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 65,115 C 65,95 80,87 100,77" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- White gap at crossing 1 -->
  <line x1="96" y1="80" x2="104" y2="74" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Bottom-right lobe -->
  <path d="M 100,77 C 120,67 135,62 148,75" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 148,75 C 162,92 162,115 145,110" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- White gap at crossing 2 -->
  <line x1="142" y1="113" x2="148" y2="107" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <path d="M 145,110 C 132,107 118,113 105,110" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Close back to top -->
  <path d="M 115,60 C 138,38 155,58 148,75" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- White gap at crossing 3 -->
  <line x1="103" y1="113" x2="109" y2="107" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Redraw over-strands -->
  <path d="M 85,80 C 95,95 100,103 105,110" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 100,77 C 120,67 135,62 148,75" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 65,115 C 65,95 80,87 100,77" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <text x="115" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">one closed curve</text>

  <!-- RIGHT: Link (Hopf Link) -->
  <text x="335" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Link (2 components)</text>

  <!-- Hopf link: two interlocked circles -->
  <!-- Circle A: centered at (310, 95), tilted slightly -->
  <!-- Circle B: centered at (360, 95), tilted slightly -->

  <!-- Circle A (left ring) - full ellipse -->
  <ellipse cx="310" cy="95" rx="40" ry="30" fill="none" stroke="#333" stroke-width="2" transform="rotate(-15, 310, 95)"/>

  <!-- White gap on Circle A where Circle B passes over it (right side intersection) -->
  <line x1="336" y1="78" x2="342" y2="88" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Circle B (right ring) - full ellipse -->
  <ellipse cx="360" cy="95" rx="40" ry="30" fill="none" stroke="#333" stroke-width="2" transform="rotate(15, 360, 95)"/>

  <!-- White gap on Circle B where Circle A passes over it (left side intersection) -->
  <line x1="328" y1="102" x2="334" y2="112" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>

  <!-- Redraw the over segments -->
  <!-- Circle B passes over Circle A on the right side -->
  <path d="M 332,72 C 340,82 342,92 338,100" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Circle A passes over Circle B on the left side -->
  <path d="M 322,98 C 328,106 334,116 342,118" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <text x="335" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">two closed curves</text>
</svg>
