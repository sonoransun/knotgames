<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 220">
  <title>Coffee cup and donut topological equivalence</title>
  <desc>A coffee cup and a donut (torus) are topologically equivalent because both have exactly one hole (genus 1).</desc>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="550" height="220" fill="#fafafa" rx="8"/>

  <!-- LEFT: Coffee cup -->
  <text x="145" y="24" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">Coffee cup</text>

  <!-- Cup body -->
  <path d="M 90 55 L 85 140 Q 85 155, 100 155 L 190 155 Q 205 155, 205 140 L 200 55 Z"
        fill="none" stroke="#333" stroke-width="2" stroke-linejoin="round"/>

  <!-- Cup rim (slight ellipse at top) -->
  <ellipse cx="145" cy="55" rx="55" ry="6" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Handle -->
  <path d="M 200 70 Q 240 70, 240 100 Q 240 130, 200 130"
        fill="none" stroke="#333" stroke-width="2"/>

  <!-- Handle hole annotation -->
  <line x1="255" y1="100" x2="238" y2="100" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="258" y="96" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="start">handle =</text>
  <text x="258" y="108" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="start">the single hole</text>

  <!-- CENTER: Equivalence symbol -->
  <text x="330" y="105" font-size="22" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">&#x2245;</text>

  <!-- RIGHT: Donut (torus) -->
  <text x="440" y="24" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">Donut (torus)</text>

  <!-- Outer torus shape -->
  <ellipse cx="440" cy="105" rx="70" ry="45" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Inner hole of torus (the hole through the middle) -->
  <ellipse cx="440" cy="105" rx="25" ry="12" fill="#fafafa" stroke="#333" stroke-width="2"/>

  <!-- Top surface shading hint -->
  <path d="M 380 85 Q 410 70, 440 68 Q 470 70, 500 85"
        fill="none" stroke="#333" stroke-width="1" opacity="0.3"/>

  <!-- Hole annotation -->
  <line x1="440" y1="125" x2="440" y2="148" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="440" y="160" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="middle">hole through the middle</text>

  <!-- Bottom shared label -->
  <text x="275" y="200" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle">Both have exactly one hole (genus 1)</text>
</svg>
