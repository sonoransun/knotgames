<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <title>Coffee cup to donut morph sequence</title>
  <desc>A five-step morph sequence showing a coffee cup continuously deforming into a donut (torus), demonstrating their topological equivalence as genus-1 surfaces.</desc>

  <style>
    @keyframes highlight {
      0%, 12% { stroke: #2255aa; stroke-width: 3; }
      20%, 100% { stroke: #333; stroke-width: 2; }
    }
    .shape1 { animation: highlight 7.5s ease infinite; }
    .shape2 { animation: highlight 7.5s ease 1.5s infinite; }
    .shape3 { animation: highlight 7.5s ease 3.0s infinite; }
    .shape4 { animation: highlight 7.5s ease 4.5s infinite; }
    .shape5 { animation: highlight 7.5s ease 6.0s infinite; }
  </style>

  <rect x="0" y="0" width="600" height="250" fill="#fafafa" rx="8"/>

  <!-- ================ SHAPE 1: Coffee cup ================ -->
  <g class="shape1">
    <!-- Cup body -->
    <path d="M 30 60 L 26 140 Q 26 155, 40 155 L 80 155 Q 94 155, 94 140 L 90 60 Z"
          fill="none" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cup rim ellipse -->
    <ellipse cx="60" cy="60" rx="30" ry="5" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Handle -->
    <path d="M 94 75 Q 120 75, 120 100 Q 120 125, 94 125"
          fill="none" stroke="#333" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="60" y="178" font-size="10" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle">Coffee cup</text>
  <!-- Handle hole annotation -->
  <line x1="122" y1="100" x2="132" y2="88" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="134" y="85" font-size="8" font-family="system-ui, sans-serif" fill="#666" text-anchor="start">the single hole</text>

  <!-- Arrow 1→2 -->
  <text x="120" y="112" font-size="14" font-family="system-ui, sans-serif" fill="#999" text-anchor="middle">&#x2192;</text>

  <!-- ================ SHAPE 2: Squat blob with prominent handle hole ================ -->
  <g class="shape2">
    <!-- Outer shape: squat rounded rectangle blob -->
    <path d="M 155 78 Q 155 62, 175 62 L 210 62 Q 230 62, 230 78
             L 230 120 Q 230 138, 210 138 L 175 138 Q 155 138, 155 120 Z"
          fill="none" stroke="#333" stroke-width="2"/>
    <!-- Inner hole (the handle hole, now more prominent) -->
    <ellipse cx="205" cy="100" rx="14" ry="18" fill="#fafafa" stroke="#333" stroke-width="2"/>
  </g>
  <!-- Arrow 2→3 -->
  <text x="244" y="112" font-size="14" font-family="system-ui, sans-serif" fill="#999" text-anchor="middle">&#x2192;</text>

  <!-- ================ SHAPE 3: Fat ring / thick torus-like blob ================ -->
  <g class="shape3">
    <!-- Outer shape: wide ring blob -->
    <path d="M 265 72 Q 265 55, 295 55 L 315 55 Q 345 55, 345 72
             L 345 128 Q 345 145, 315 145 L 295 145 Q 265 145, 265 128 Z"
          fill="none" stroke="#333" stroke-width="2"/>
    <!-- Inner hole (larger, more centered) -->
    <ellipse cx="305" cy="100" rx="18" ry="22" fill="#fafafa" stroke="#333" stroke-width="2"/>
  </g>
  <!-- Arrow 3→4 -->
  <text x="362" y="112" font-size="14" font-family="system-ui, sans-serif" fill="#999" text-anchor="middle">&#x2192;</text>

  <!-- ================ SHAPE 4: Near-torus, slightly asymmetric ================ -->
  <g class="shape4">
    <!-- Outer ellipse, slightly taller than final torus -->
    <ellipse cx="420" cy="100" rx="42" ry="38" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Inner hole (approaching torus proportions, slightly off-center vertically) -->
    <ellipse cx="420" cy="102" rx="18" ry="14" fill="#fafafa" stroke="#333" stroke-width="2"/>
  </g>
  <!-- Arrow 4→5 -->
  <text x="476" y="112" font-size="14" font-family="system-ui, sans-serif" fill="#999" text-anchor="middle">&#x2192;</text>

  <!-- ================ SHAPE 5: Donut (torus) ================ -->
  <g class="shape5">
    <!-- Outer torus ellipse -->
    <ellipse cx="540" cy="100" rx="45" ry="35" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Inner torus hole -->
    <ellipse cx="540" cy="100" rx="18" ry="10" fill="#fafafa" stroke="#333" stroke-width="2"/>
    <!-- Top surface shading hint -->
    <path d="M 502 82 Q 520 70, 540 68 Q 560 70, 578 82"
          fill="none" stroke="#333" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="540" y="178" font-size="10" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle">Donut (torus)</text>
  <!-- Torus hole annotation -->
  <line x1="540" y1="115" x2="540" y2="148" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="540" y="158" font-size="8" font-family="system-ui, sans-serif" fill="#666" text-anchor="middle">same hole</text>

  <!-- Topological equivalence symbol between first and last -->
  <text x="300" y="195" font-size="14" font-family="system-ui, sans-serif" fill="#555" text-anchor="middle">&#x2245;</text>

  <!-- Bottom explanation -->
  <text x="300" y="225" font-size="11" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle">Both have exactly one hole (genus 1) &#x2014; continuous deformation preserves topology</text>
</svg>
