<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 180">
  <title>Closed curve vs open curve</title>
  <desc>Side-by-side comparison of a closed curve (loop) with no endpoints and an open curve (arc) with two endpoints.</desc>

  <rect x="0" y="0" width="450" height="180" fill="#fafafa" rx="8"/>

  <!-- Divider line -->
  <line x1="225" y1="20" x2="225" y2="160" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Closed curve (loop) -->
  <text x="112" y="28" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">Closed curve (loop)</text>

  <ellipse cx="112" cy="90" rx="60" ry="40" fill="none" stroke="#333" stroke-width="2"/>

  <text x="112" y="155" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="middle">no endpoints</text>

  <!-- RIGHT: Open curve (arc) -->
  <text x="337" y="28" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">Open curve (arc)</text>

  <path d="M 277 100 Q 297 50, 320 85 Q 343 120, 365 60 Q 380 30, 397 100"
        fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Endpoint dots -->
  <circle cx="277" cy="100" r="4" fill="#333" stroke="none"/>
  <circle cx="397" cy="100" r="4" fill="#333" stroke="none"/>

  <!-- Endpoint labels with leader lines -->
  <line x1="277" y1="112" x2="277" y2="126" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="277" y="137" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="middle">endpoint</text>

  <line x1="397" y1="112" x2="397" y2="126" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="397" y="137" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="middle">endpoint</text>

  <text x="337" y="160" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="middle">two endpoints</text>
</svg>
