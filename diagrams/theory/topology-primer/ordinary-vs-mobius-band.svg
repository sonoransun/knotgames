<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240">
  <title>Ordinary Band vs Mobius Band</title>
  <desc>Side-by-side comparison showing how the ordinary band has 2 separate colored edges while the Mobius band's half-twist merges them into 1 continuous edge.</desc>

  <rect width="560" height="240" fill="#fafafa" rx="8"/>

  <!-- Dashed vertical divider -->
  <line x1="280" y1="15" x2="280" y2="210" stroke="#ccc" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== LEFT PANEL: Ordinary band ===== -->
  <g transform="translate(20, 10)">
    <text x="120" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">Ordinary band</text>

    <!-- Band body: perspective cylinder-like strip -->
    <!-- Light fill for the surface -->
    <path d="M 30,45 Q 120,35 210,45 L 210,115 Q 120,125 30,115 Z"
          fill="#e8e0d8" fill-opacity="0.25" stroke="none"/>

    <!-- Top edge (red) -->
    <path d="M 30,45 Q 120,35 210,45" fill="none" stroke="#c44" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bottom edge (blue) -->
    <path d="M 30,115 Q 120,125 210,115" fill="none" stroke="#44c" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left side edge -->
    <line x1="30" y1="45" x2="30" y2="115" stroke="#999" stroke-width="1.2"/>
    <!-- Right side edge -->
    <line x1="210" y1="45" x2="210" y2="115" stroke="#999" stroke-width="1.2"/>

    <!-- Corner labels -->
    <text x="20" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#c44" font-weight="bold">A</text>
    <text x="215" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#c44" font-weight="bold">B</text>
    <text x="20" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#44c" font-weight="bold">D</text>
    <text x="215" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#44c" font-weight="bold">C</text>

    <!-- Joining arrows: A->B straight (red) -->
    <path d="M 26,38 Q 120,28 214,38" fill="none" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
    <!-- Joining arrows: D->C straight (blue) -->
    <path d="M 26,132 Q 120,140 214,132" fill="none" stroke="#44c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

    <!-- Small labels on arrows -->
    <text x="120" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#c44">A &#x2192; B</text>
    <text x="120" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#44c">D &#x2192; C</text>

    <!-- Annotation -->
    <text x="120" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">2 edges, 2 sides</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#c44"/>
    </marker>
    <marker id="arrowBlue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#44c"/>
    </marker>
    <marker id="arrowGray" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#999"/>
    </marker>
  </defs>

  <!-- ===== RIGHT PANEL: Mobius band ===== -->
  <g transform="translate(300, 10)">
    <text x="120" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#333" font-weight="bold">M&#246;bius band</text>

    <!-- Band body with twist -->
    <!-- Left portion of strip (before twist) -->
    <path d="M 30,45 L 100,47 L 100,113 L 30,115 Z"
          fill="#e8e0d8" fill-opacity="0.2" stroke="none"/>
    <!-- Twisted middle portion -->
    <path d="M 100,47 L 140,53 L 140,107 L 100,113 Z"
          fill="#e8e0d8" fill-opacity="0.15" stroke="none"/>
    <!-- Right portion of strip (after twist) -->
    <path d="M 140,53 L 210,55 L 210,105 L 140,107 Z"
          fill="#e8e0d8" fill-opacity="0.2" stroke="none"/>

    <!-- LEFT end: red on top, blue on bottom (normal) -->
    <path d="M 30,45 L 100,47" fill="none" stroke="#c44" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 30,115 L 100,113" fill="none" stroke="#44c" stroke-width="2.5" stroke-linecap="round"/>

    <!-- TWIST CROSSING REGION: edges cross over each other -->
    <!-- Under-crossing: blue going up (draw first, will be partially hidden) -->
    <path d="M 100,113 L 140,53" fill="none" stroke="#44c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- White gap for the crossing -->
    <line x1="115" y1="72" x2="125" y2="88" stroke="#fafafa" stroke-width="7" stroke-linecap="round"/>
    <!-- Over-crossing: red going down -->
    <path d="M 100,47 L 140,107" fill="none" stroke="#c44" stroke-width="2.5" stroke-linecap="round"/>

    <!-- RIGHT end: blue on top (swapped!), red on bottom (swapped!) -->
    <path d="M 140,53 L 210,55" fill="none" stroke="#44c" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 140,107 L 210,105" fill="none" stroke="#c44" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left side edge -->
    <line x1="30" y1="45" x2="30" y2="115" stroke="#999" stroke-width="1.2"/>
    <!-- Right side edge -->
    <line x1="210" y1="55" x2="210" y2="105" stroke="#999" stroke-width="1.2"/>

    <!-- Corner labels -->
    <text x="20" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#c44" font-weight="bold">A</text>
    <text x="215" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#44c" font-weight="bold">B</text>
    <text x="20" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#44c" font-weight="bold">D</text>
    <text x="215" y="117" font-family="system-ui, sans-serif" font-size="11" fill="#c44" font-weight="bold">C</text>

    <!-- Joining arrows showing twist: A->C diagonal -->
    <path d="M 26,42 Q 5,80 26,120" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="2" y="72" font-family="system-ui, sans-serif" font-size="8" fill="#999">A&#x2192;C</text>
    <text x="2" y="92" font-family="system-ui, sans-serif" font-size="8" fill="#999">D&#x2192;B</text>

    <!-- Joining arrows on right: showing the reversed identification -->
    <path d="M 214,52 Q 234,80 214,110" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3"/>

    <!-- Annotation -->
    <text x="120" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">1 edge, 1 side</text>
  </g>

  <!-- Bottom annotation -->
  <text x="280" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888" font-style="italic">The half-twist makes both edges into one continuous boundary</text>
</svg>