<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <title>Loop vs arc on a post</title>
  <desc>A closed loop is trapped around a post and cannot be removed, while an open arc draped over a post can slide right off the end.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="500" height="200" fill="#fafafa" rx="8"/>

  <!-- Divider -->
  <line x1="250" y1="15" x2="250" y2="185" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Loop around post (trapped) -->
  <text x="125" y="22" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">Loop around post (trapped)</text>

  <!-- Post -->
  <rect x="110" y="45" width="30" height="70" fill="#ddd" stroke="#333" stroke-width="2" rx="2"/>

  <!-- Cord loop: behind post (left side) -->
  <path d="M 80 80 Q 60 50, 80 40 Q 100 30, 125 35"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Cord loop: behind post (right side, hidden by post) -->
  <!-- Cord loop: front of post (right side) -->
  <path d="M 125 35 L 125 35" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 140 35 Q 165 30, 175 50 Q 185 75, 170 95 Q 155 115, 125 120"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Cord loop: front of post (left side) -->
  <path d="M 125 120 Q 95 115, 80 100 Q 68 88, 80 80"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Crossing indicators: cord passes behind the post -->
  <line x1="110" y1="35" x2="110" y2="35" stroke="#fafafa" stroke-width="6"/>

  <!-- "cannot remove" label -->
  <text x="125" y="155" font-size="10" font-family="system-ui, sans-serif" fill="#999" text-anchor="middle">cannot remove</text>

  <!-- X marks to indicate trapped -->
  <text x="70" y="80" font-size="14" font-family="system-ui, sans-serif" fill="#c44">&#x2717;</text>
  <text x="175" y="80" font-size="14" font-family="system-ui, sans-serif" fill="#c44">&#x2717;</text>

  <!-- RIGHT: Arc over post (free) -->
  <text x="375" y="22" font-size="12" font-family="system-ui, sans-serif" fill="#333" text-anchor="middle" font-weight="bold">Arc over post (free)</text>

  <!-- Post -->
  <rect x="360" y="45" width="30" height="70" fill="#ddd" stroke="#333" stroke-width="2" rx="2"/>

  <!-- Cord arc draped over post -->
  <path d="M 315 110 Q 330 60, 355 42 Q 375 30, 395 42 Q 420 60, 435 110"
        fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>

  <!-- Endpoint dots -->
  <circle cx="315" cy="110" r="4" fill="#333" stroke="none"/>
  <circle cx="435" cy="110" r="4" fill="#333" stroke="none"/>

  <!-- Endpoint labels -->
  <text x="307" y="107" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="end">o</text>
  <text x="443" y="107" font-size="10" font-family="system-ui, sans-serif" fill="#666" text-anchor="start">o</text>

  <!-- "slide right off the end" label with arrow -->
  <text x="375" y="148" font-size="10" font-family="system-ui, sans-serif" fill="#999" text-anchor="middle">slide right off the end</text>
  <line x1="433" y1="145" x2="460" y2="145" stroke="#999" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Lifting arrow on the arc -->
  <path d="M 435 108 Q 450 90, 465 85" fill="none" stroke="#999" stroke-width="0.75" marker-end="url(#arrowhead)"/>
</svg>
