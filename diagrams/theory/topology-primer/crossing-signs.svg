<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250">
  <title>Crossing Sign Convention</title>
  <desc>Diagram showing positive and negative crossing signs used in linking number calculation. The left crossing (sign = +1) has the cord going upper-left to lower-right over the crossbar. The right crossing (sign = −1) has the cord going upper-right to lower-left over the crossbar. The cord is shown in blue and the crossbar in steel gray.</desc>

  <rect width="500" height="250" fill="#fafafa"/>

  <!-- ===== LEFT CROSSING: sign = +1 ===== -->
  <g transform="translate(125, 100)">
    <!-- Title -->
    <text x="0" y="-70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">sign = +1</text>

    <!-- Crossbar (under strand): draw full line, then gap, then segments in steel gray -->
    <!-- Gap at crossing point: background-colored fat stroke to create break -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
    <!-- Crossbar left segment -->
    <line x1="-60" y1="0" x2="-10" y2="0" stroke="#888" stroke-width="2.5"/>
    <!-- Crossbar right segment -->
    <line x1="10" y1="0" x2="60" y2="0" stroke="#888" stroke-width="2.5"/>
    <!-- Crossbar arrowhead (steel gray) -->
    <polygon points="60,0 50,-5 50,5" fill="#888"/>

    <!-- Cord (over strand): diagonal upper-left to lower-right in blue -->
    <line x1="-50" y1="-50" x2="50" y2="50" stroke="#2255aa" stroke-width="2.5"/>
    <!-- Arrowhead on cord (blue) -->
    <polygon points="50,50 38,42 44,48" fill="#2255aa"/>

    <!-- Labels -->
    <text x="-52" y="-40" font-family="system-ui, sans-serif" font-size="10" fill="#2255aa" transform="rotate(-45, -52, -40)">cord</text>
    <text x="30" y="-12" font-family="system-ui, sans-serif" font-size="10" fill="#888">crossbar</text>
  </g>

  <!-- ===== RIGHT CROSSING: sign = −1 ===== -->
  <g transform="translate(375, 100)">
    <!-- Title -->
    <text x="0" y="-70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">sign = &#x2212;1</text>

    <!-- Crossbar (under strand): gap then segments in steel gray -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
    <!-- Crossbar left segment -->
    <line x1="-60" y1="0" x2="-10" y2="0" stroke="#888" stroke-width="2.5"/>
    <!-- Crossbar right segment -->
    <line x1="10" y1="0" x2="60" y2="0" stroke="#888" stroke-width="2.5"/>
    <!-- Crossbar arrowhead (steel gray) -->
    <polygon points="60,0 50,-5 50,5" fill="#888"/>

    <!-- Cord (over strand): diagonal upper-right to lower-left in blue -->
    <line x1="50" y1="-50" x2="-50" y2="50" stroke="#2255aa" stroke-width="2.5"/>
    <!-- Arrowhead on cord (blue) -->
    <polygon points="-50,50 -38,42 -44,48" fill="#2255aa"/>

    <!-- Labels -->
    <text x="28" y="-40" font-family="system-ui, sans-serif" font-size="10" fill="#2255aa" transform="rotate(45, 28, -40)">cord</text>
    <text x="30" y="-12" font-family="system-ui, sans-serif" font-size="10" fill="#888">crossbar</text>
  </g>

  <!-- ===== FORMULA ===== -->
  <text x="250" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#999">Linking number = (+1 + &#x2212;1) / 2 = 0</text>
</svg>
