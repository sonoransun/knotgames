<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <title>Borromean Rings</title>
  <desc>Classic Borromean rings: three interlocked rings (A red, B blue, C gold) arranged in a triangular pattern. The crossing convention is cyclic: A over B, B over C, C over A. Removing any single ring causes the other two to separate.</desc>

  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="400" height="350" fill="#fafafa"/>

  <text x="200" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#333" font-weight="bold">Borromean Rings</text>

  <!--
    Three elliptical rings in a triangular arrangement:
    Ring A (red #c44): top, no rotation
    Ring B (blue #44c): bottom-left, rotated 30°
    Ring C (gold #ca4): bottom-right, rotated -30°
    Crossing rule: A over B, B over C, C over A (cyclic)

    Ring geometry:
      A center: (200, 120), rx=70 ry=35, rotation=0°
      B center: (155, 175), rx=70 ry=35, rotation=30°
      C center: (245, 175), rx=70 ry=35, rotation=-30°

    Intersection points (computed numerically):
      A∩B: (187.1, 154.4) and (132.8, 129.8)
      B∩C: (200.0, 165.8) and (200.0, 220.2)
      C∩A: (267.2, 129.8) and (212.9, 154.4)
  -->

  <!-- Step 1: Draw all three complete ellipses (background layer) -->
  <!-- Ring C (gold) - bottom-right -->
  <ellipse cx="245" cy="175" rx="70" ry="35" fill="none" stroke="#ca4" stroke-width="2.5" transform="rotate(-30, 245, 175)"/>

  <!-- Ring B (blue) - bottom-left -->
  <ellipse cx="155" cy="175" rx="70" ry="35" fill="none" stroke="#44c" stroke-width="2.5" transform="rotate(30, 155, 175)"/>

  <!-- Ring A (red) - top -->
  <ellipse cx="200" cy="120" rx="70" ry="35" fill="none" stroke="#c44" stroke-width="2.5"/>

  <!-- Step 2: For each crossing, erase the under-strand with a white gap,
       then redraw the over-strand as a precise cubic bezier arc segment.
       Gap: stroke-width 10, #fafafa background color, round linecap.
       Over-strand arcs: ~30px chord, computed from ellipse parametric equations. -->

  <!-- Crossing 1: A over B at (187.1, 154.4) -->
  <line x1="178.6" y1="148.5" x2="194.9" y2="160.8" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <path d="M 204.5,154.9 C 192.9,155.3 181.1,154.2 170.5,151.7" fill="none" stroke="#c44" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Crossing 2: A over B at (132.8, 129.8) -->
  <line x1="124.2" y1="128.8" x2="141.9" y2="131.8" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <path d="M 139.7,137.8 C 133.8,132.8 130.4,127.0 130.0,121.1" fill="none" stroke="#c44" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Crossing 3: B over C at (200.0, 165.8) -->
  <line x1="193.9" y1="172.7" x2="207.1" y2="159.1" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <path d="M 187.7,154.8 C 196.7,161.8 204.3,169.6 209.5,177.3" fill="none" stroke="#44c" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Crossing 4: B over C at (200.0, 220.2) -->
  <line x1="207.1" y1="221.2" x2="193.9" y2="218.2" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <path d="M 209.5,216.3 C 204.3,219.8 196.7,221.5 187.7,221.3" fill="none" stroke="#44c" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Crossing 5: C over A at (267.2, 129.8) -->
  <line x1="269.4" y1="124.6" x2="263.5" y2="134.7" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <path d="M 251.9,133.6 C 262.3,130.2 272.5,128.5 281.1,128.7" fill="none" stroke="#ca4" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Crossing 6: C over A at (212.9, 154.4) -->
  <line x1="223.0" y1="153.1" x2="202.4" y2="155.0" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
  <path d="M 200.4,165.3 C 207.9,157.8 217.2,150.6 227.3,144.8" fill="none" stroke="#ca4" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Ring labels -->
  <text x="200" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#c44" font-weight="bold">A</text>
  <text x="110" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#44c" font-weight="bold">B</text>
  <text x="290" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ca4" font-weight="bold">C</text>

  <!-- Annotation text -->
  <text x="200" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">A over B, B over C, C over A</text>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">Remove any one: the other two separate</text>
</svg>
